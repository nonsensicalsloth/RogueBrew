<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brewery Trail — RogueBrew</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a08;--bg2:#141410;--bg3:#1e1e18;--border:#4a3a1a;--gold:#d4a830;--text:#c8b878;--dim:#6a5a38;--green:#3a6a2a;--red:#8a2a18;--pixel:'Press Start 2P',monospace;--serif:'Special Elite',cursive;--mono:'Courier Prime',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 48px;}
.frame{width:100%;max-width:640px;border:2px solid var(--border);background:var(--bg2);padding:20px 24px;position:relative;}
.frame::before,.frame::after{content:'❖';position:absolute;top:6px;color:var(--border);font-size:12px;}
.frame::before{left:8px;}.frame::after{right:8px;}
.frame-bottom{border-top:1px solid var(--border);margin-top:18px;padding-top:14px;text-align:center;}
.frame-title{font-family:var(--pixel);font-size:clamp(8px,2vw,11px);color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:1px;}
.frame-sub{font-family:var(--pixel);font-size:7px;color:var(--dim);text-align:center;margin-bottom:16px;}
.screen{display:none;width:100%;max-width:640px;}.screen.active{display:block;}
p{font-family:var(--serif);font-size:15px;line-height:1.75;margin-bottom:12px;color:var(--text);}
h2{font-family:var(--pixel);font-size:clamp(9px,2vw,12px);color:var(--gold);margin-bottom:12px;line-height:1.8;}
.status-bar{background:var(--bg3);border:1px solid var(--border);padding:8px 12px;margin-bottom:14px;font-family:var(--mono);font-size:11px;line-height:1.9;display:grid;grid-template-columns:1fr 1fr;}
.status-bar span{color:var(--dim);}.status-bar strong{color:var(--text);}
.health-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.health-name{font-family:var(--mono);font-size:10px;color:var(--text);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.health-track{flex:1;height:7px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;}
.health-fill{height:100%;transition:width 0.4s,background 0.3s;}
.health-val{font-family:var(--pixel);font-size:7px;color:var(--dim);width:24px;text-align:right;}
.health-section{margin-bottom:12px;}
.beer-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border);padding:7px 12px;}
.beer-label{font-family:var(--pixel);font-size:7px;color:var(--gold);}
.beer-track{flex:1;height:9px;background:var(--bg);border:1px solid var(--border);overflow:hidden;}
.beer-fill{height:100%;background:#d4a830;transition:width 0.5s;}
.beer-pct{font-family:var(--pixel);font-size:7px;color:var(--gold);min-width:36px;text-align:right;}
.choices{list-style:none;margin:12px 0;}
.choices li{margin-bottom:8px;}
.choice-btn{background:none;border:none;color:var(--text);font-family:var(--mono);font-size:13px;cursor:pointer;text-align:left;width:100%;padding:4px 0;line-height:1.5;transition:color 0.1s;}
.choice-btn:hover{color:var(--gold);}
.choice-btn .num{color:var(--gold);font-family:var(--pixel);font-size:8px;margin-right:8px;}
.choice-btn .note{color:var(--dim);font-size:11px;display:block;padding-left:22px;line-height:1.5;}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.input-label{font-family:var(--mono);font-size:12px;color:var(--text);min-width:180px;}
.trail-input{background:none;border:none;border-bottom:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:12px;width:160px;outline:none;padding:2px 4px;}
.trail-input::placeholder{color:var(--dim);}
.event-box{background:var(--bg3);border:1px solid var(--border);padding:14px 16px;margin:12px 0;}
.event-title{font-family:var(--pixel);font-size:9px;color:var(--gold);margin-bottom:10px;line-height:1.8;}
.outcome-good{color:#7acc5a;font-family:var(--serif);font-size:14px;line-height:1.75;}
.outcome-bad{color:#cc6a4a;font-family:var(--serif);font-size:14px;line-height:1.75;}
.outcome-suffix{color:var(--gold);font-family:var(--pixel);font-size:7px;margin-top:8px;line-height:1.8;}
.shop-table{width:100%;border-collapse:collapse;margin:10px 0;font-family:var(--mono);font-size:12px;}
.shop-table td{padding:5px 8px;border-bottom:1px solid var(--bg3);}
.shop-table td:last-child{text-align:right;color:var(--gold);}
.shop-total td{border-top:1px solid var(--border) !important;border-bottom:none !important;font-family:var(--pixel);font-size:8px;color:var(--gold);}
.btn-continue{background:none;border:none;font-family:var(--pixel);font-size:8px;color:var(--dim);cursor:pointer;margin-top:6px;transition:color 0.1s;display:block;width:100%;text-align:center;}
.btn-continue:hover{color:var(--gold);}
.btn-primary{background:var(--border);border:1px solid var(--gold);color:var(--gold);font-family:var(--pixel);font-size:8px;padding:10px 20px;cursor:pointer;transition:all 0.15s;letter-spacing:1px;}
.btn-primary:hover{background:var(--gold);color:var(--bg);}
.tasting-note{background:var(--bg3);border:1px solid var(--gold);padding:16px 20px;margin:14px 0;font-family:var(--serif);font-size:15px;line-height:1.9;color:var(--text);font-style:italic;}
.score-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bg3);font-family:var(--mono);font-size:11px;}
.score-label{color:var(--dim);}.score-val{color:var(--text);}
.fade-in{animation:fi 0.3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.red{color:#c04a2a;}.green{color:#5aaa3a;}.gold-text{color:var(--gold);}
</style>
</head>
<body>
<div id="game"></div>
<script>

// ═══════════════════════════════════════════ STATE
const G={role:null,playerName:'',companions:[],supplies:{food:400,coin:200,parts:3,ponies:4,athelas:2},beer:100,health:100,maxHealth:100,day:1,location:'The Shire',pathFlags:{},tastingNotes:[],achievements:[],shopDoneFn:null,pace:'steady',illnesses:{}};
const PACE={steady:{label:'Steady',dayMult:1,foodMult:1},grueling:{label:'Grueling',dayMult:0.75,foodMult:1.4},resting:{label:'Resting',dayMult:1.5,foodMult:0.8}};
const ROLES={
  head_brewer:{label:'Head Brewer',home:'Michel Delving',supplies:{food:0,coin:350,parts:0,ponies:0,athelas:0},mult:0.8,desc:'Most supplies. Score ×0.8.'},
  assistant:{label:'Assistant Brewer',home:'Hobbiton',supplies:{food:0,coin:200,parts:0,ponies:0,athelas:0},mult:1.0,desc:'Balanced. Score ×1.0.'},
  cellarman:{label:'Cellarman',home:'Bywater',supplies:{food:0,coin:120,parts:0,ponies:0,athelas:0},mult:1.3,desc:'Fewest supplies. Score ×1.3.'},
};
const CROLES=[
  {rk:'hop_farmer',role:'Hop Farmer',def:'Sam'},
  {rk:'maltster',role:'Maltster',def:'Merry'},
  {rk:'taproom_hand',role:'Salesperson',def:'Pippin'},
  {rk:'cellarman_c',role:'Cellarman',def:'Fedegar'},
  {rk:'cooper',role:'Bartender',def:'Folco'},
  {rk:'maintenance',role:'Maintenance Technician',def:'Bilbo'},
];

// ═══════════════════════════════════════════ HELPERS
function R(html){const el=document.getElementById('game');el.innerHTML=`<div class="screen active fade-in">${html}</div>`;window.scrollTo(0,0);}
function frame(title,sub,body,footer=''){return `<div class="frame">${title?`<div class="frame-title">${title}</div>`:''}${sub?`<div class="frame-sub">${sub}</div>`:''}${body}${footer?`<div class="frame-bottom">${footer}</div>`:''}</div>`;}
function hc(v){return v>60?'#5aaa3a':v>30?'#d4a830':'#c04a2a';}
function statusBar(){
  const alive=G.companions.filter(c=>c.health>0).length;
  const pm=PACE[G.pace];
  const dailyFood=Math.round(7*pm.foodMult);
  const daysLeft=dailyFood>0?Math.floor(G.supplies.food/dailyFood):999;
  const fc=daysLeft<=3?'#c04a2a':daysLeft<=7?'#d4a830':'var(--text)';
  const pc=G.pace==='grueling'?'#c04a2a':G.pace==='resting'?'#5aaa3a':'var(--text)';
  return '<div class="status-bar">'
    +'<div style="grid-column:1/-1;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:4px;display:flex;justify-content:space-between">'
    +'<span style="color:var(--gold);font-family:var(--pixel);font-size:7px">'+gameDate()+'</span>'
    +'<span style="color:var(--dim);font-size:10px">Day '+G.day+' &nbsp;·&nbsp; '+(G.miles||0)+' miles</span>'
    +'</div>'
    +'<div><span>Location: </span><strong>'+G.location+'</strong></div>'
    +'<div><span>Pace: </span><strong style="color:'+pc+'">'+pm.label+'</strong></div>'
    +'<div><span>Food: </span><strong style="color:'+fc+'">'+G.supplies.food+' lbs</strong></div>'
    +'<div><span>Days left: </span><strong style="color:'+fc+'">~'+daysLeft+'</strong></div>'
    +'<div><span>Coin: </span><strong>'+G.supplies.coin+'</strong></div>'
    +'<div><span>Parts: </span><strong>'+G.supplies.parts+'</strong></div>'
    +'<div><span>Ponies: </span><strong>'+G.supplies.ponies+'</strong></div>'
    +'<div><span>Athelas: </span><strong>'+G.supplies.athelas+'</strong></div>'
    +'<div><span>Party: </span><strong>'+alive+'/6 alive</strong></div>'
    +'</div>';
}
// beerBar() defined below in BREW SETUP section
function partyHealth(){const all=[{name:G.playerName||'You',health:G.health,maxHealth:G.maxHealth,status:''},...G.companions];return `<div class="health-section">${all.map(c=>{const pct=c.maxHealth>0?Math.max(0,c.health/c.maxHealth):0;const dead=c.health<=0;const statusLabel=c.status&&c.status!=='dead'?` <span style="font-size:8px;color:#c04a2a">[${c.status}]</span>`:'';return `<div class="health-row"><div class="health-name"${dead?' style="color:var(--dim);text-decoration:line-through"':''}>${c.name}${c.role?` <span style="font-size:9px;color:var(--dim)">(${c.role.split(' ')[0]})</span>`:''}${statusLabel}</div><div class="health-track"><div class="health-fill" style="width:${pct*100}%;background:${hc(pct*100)}"></div></div><div class="health-val">${dead?'✝':Math.round(c.health)}</div></div>`;}).join('')}</div>`;}
function choices(items){return `<ul class="choices">${items.map((it,i)=>`<li><button class="choice-btn" onclick="${it.fn}"><span class="num">${i+1}.</span>${it.label}${it.note?`<span class="note">${it.note}</span>`:''}</button></li>`).join('')}</ul>`;}
function paceControl(){const btns=Object.entries(PACE).map(([k,v])=>{const active=G.pace===k;return `<button onclick="setPace('${k}')" style="background:${active?'var(--border)':'none'};border:1px solid ${active?'var(--gold)':'var(--border)'};color:${active?'var(--gold)':'var(--dim)'};font-family:var(--mono);font-size:10px;padding:2px 8px;margin:0 3px;cursor:pointer">${v.label}</button>`;}).join('');return `<div style="margin:8px 0 14px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);font-size:11px;font-family:var(--mono)"><span style="color:var(--dim)">Travel pace: </span>${btns}</div>`;}
window.setPace=function(k){G.pace=k;const el=document.querySelector('.pace-bar');if(el)el.outerHTML=paceControl();else{const game=document.getElementById('game');if(game)game.querySelectorAll('[data-pace]').forEach(e=>e.remove());}// Re-render status bar in place
const sb=document.querySelector('.status-bar');if(sb)sb.outerHTML=statusBar();};
function advance(baseDays){const pm=PACE[G.pace];const n=Math.round(baseDays*pm.dayMult);G.day+=n;const consumed=Math.round(n*7*pm.foodMult);G.supplies.food=Math.max(0,G.supplies.food-consumed);
// Starvation spiral — escalates each day without food
if(G.supplies.food===0){for(let d=0;d<n;d++)starvationTick();}else{G.starveDays=0;}
if(G.pace==='grueling'&&Math.random()<0.3*baseDays){damageRandom(8);morale(-4,'grueling pace');}
if(G.pace==='resting'&&Math.random()<0.2){healAll(5);morale(3,'resting');}
// Illness probability increases at grueling pace
if(G.pace==='grueling'&&Math.random()<0.08*baseDays){infectRandom('exhaustion');}
tickIllnesses();
tickWeather();
rollWeather();
addMiles(Math.round(n*25));
applyMoraleEffects();
return n;}
function damageRandom(amt){const alive=G.companions.filter(c=>c.health>0);if(!alive.length)return null;const v=alive[Math.floor(Math.random()*alive.length)];v.health=Math.max(0,v.health-amt);if(v.health<=0)v.status='dead';return v;}
function damageAll(amt){G.health=Math.max(0,G.health-amt);G.companions.forEach(c=>{if(c.health>0)c.health=Math.max(0,c.health-amt);});}
function healAll(amt){G.health=Math.min(G.maxHealth,G.health+amt);G.companions.forEach(c=>{if(c.health>0)c.health=Math.min(c.maxHealth,c.health+amt);});}
function hasRole(rk){return G.companions.some(c=>c.rk===rk&&c.health>0);}
function addNote(n){if(!G.tastingNotes.includes(n))G.tastingNotes.push(n);}
function addAch(id,label){if(!G.achievements.find(a=>a.id===id))G.achievements.push({id,label});}
function useBeer(amt,reason){G.beer=Math.max(0,G.beer-amt);addNote('generous on the palate, giving rather than keeping');}
let _nextFn=null;
window._continue=function(){if(_nextFn){const f=_nextFn;_nextFn=null;f();}};
function showEvent(title,text,isGood,suffix,nextFn){
  _nextFn=nextFn;
  R(frame(title,G.location+' — Day '+G.day,
    statusBar()+nextLandmark()+beerBar()+moraleBar()+milesBar()+weatherBar()+partyHealth()+illnessBar()+
    '<div class="event-box"><div class="'+(isGood?'outcome-good':'outcome-bad')+'">'+text+'</div>'+(suffix?'<div class="outcome-suffix">'+suffix+'</div>':'')+'</div>',
    '<button class="btn-primary" onclick="_continue()">Continue →</button>'
  ));
}
function getStarter(){
  try{const s=JSON.parse(localStorage.getItem('roguebrew_tamagotchi_starter'));if(s&&s.name)return s;}catch(e){}
  return G.brew||null;
}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

// ═══════════════════════════════════════════ CALENDAR + LANDMARKS
// Start: 23 September, Year 3018 (day Frodo left Bag End)
const START_MONTH=9,START_DAY=23,START_YEAR=3018;
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_DAYS=[31,28,31,30,31,30,31,31,30,31,30,31];
function gameDate(){
  let d=(G.day||1)-1,mo=START_MONTH-1,dy=START_DAY,yr=START_YEAR;
  dy+=d;
  while(dy>MONTH_DAYS[mo]){dy-=MONTH_DAYS[mo];mo++;if(mo>11){mo=0;yr++;}}
  return dy+' '+MONTHS[mo]+' '+yr+' S.R.';
}
// Landmark sequence with mile markers
const LANDMARKS=[
  {name:'Brandywine River',miles:80},
  {name:'Bree',miles:210},
  {name:'Weathertop',miles:490},
  {name:'Rivendell',miles:670},
  {name:'Misty Mountains',miles:870},
  {name:'Lothlórien',miles:1390},
  {name:'Edoras',miles:1770},
  {name:'Minas Tirith',miles:1990},
  {name:'Mount Doom',miles:2900},
];
function nextLandmark(){
  const m=G.miles||0;
  const next=LANDMARKS.find(l=>l.miles>m);
  if(!next)return '';
  const dist=next.miles-m;
  const daysEst=Math.ceil(dist/(25*(PACE[G.pace]?.dayMult||1)*Math.max(1,G.supplies.ponies)));
  return '<div style="font-family:var(--mono);font-size:10px;color:var(--dim);padding:3px 12px;margin-bottom:4px">'
    +'Next: <strong style="color:var(--text)">'+next.name+'</strong>'
    +' — ~'+dist+' miles (~'+daysEst+' days at current pace)</div>';
}


// ═══════════════════════════════════════════ BREW SETUP
// Called from showTitle if no external brew data exists
function showBrewSetup(){
  R(frame('THE BREW','What are you carrying to Mount Doom?',
    '<p>Before you set out, name the brew. It will travel with you, be offered to strangers, poured into rivers, and perhaps survive to the end. Or not.</p>'
    +'<div class="input-row"><label class="input-label">Brew name</label><input class="trail-input" id="brew_name" placeholder="e.g. Bywater Best" maxlength="28"></div>'
    +'<div class="input-row"><label class="input-label">Style</label><select id="brew_style" style="background:var(--bg2);border:none;border-bottom:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:12px;padding:2px 4px;outline:none;width:160px">'
    +'<option value="pale ale">Pale Ale</option>'
    +'<option value="dark stout">Dark Stout</option>'
    +'<option value="golden lager">Golden Lager</option>'
    +'<option value="wheat beer">Wheat Beer</option>'
    +'<option value="porter">Porter</option>'
    +'<option value="IPA">IPA</option>'
    +'<option value="amber ale">Amber Ale</option>'
    +'<option value="pilsner">Pilsner</option>'
    +'</select></div>'
    +'<div class="input-row"><label class="input-label">Starting ABV</label><select id="brew_abv" style="background:var(--bg2);border:none;border-bottom:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:12px;padding:2px 4px;outline:none;width:160px">'
    +'<option value="3.8">3.8% — Session</option>'
    +'<option value="4.5" selected>4.5% — Standard</option>'
    +'<option value="5.5">5.5% — Full</option>'
    +'<option value="7.0">7.0% — Strong</option>'
    +'<option value="9.0">9.0% — Imperial</option>'
    +'</select></div>'
    +'<p style="font-size:11px;color:var(--dim);margin-top:8px">The brew starts at 100%. Every hardship, river crossing, and generous pour chips away at it. What arrives at Mount Doom — if anything does — is what you scored.</p>',
    '<button class="btn-primary" onclick="confirmBrew()">Pack the barrel →</button>'
  ));
}
window.confirmBrew=function(){
  const name=document.getElementById('brew_name')?.value.trim()||'Shire Best';
  const style=document.getElementById('brew_style')?.value||'pale ale';
  const abv=parseFloat(document.getElementById('brew_abv')?.value||'4.5');
  G.brew={name,style,abv};
  showRoleSelect();
};

// ═══════════════════════════════════════════ BREW CONDITION
// The brew has a condition label based on % remaining + journey events
function brewCondition(){
  const pct=G.beer;
  const notes=G.tastingNotes.length;
  if(pct>=85)return{label:'Pristine',color:'#5aaa3a',desc:'Perfectly sealed. Every sip as intended.'};
  if(pct>=65)return{label:'Road-Worn',color:'#d4a830',desc:'A little of the journey in every glass.'};
  if(pct>=40)return{label:'Battle-Scarred',color:'#c08a2a',desc:'Rough handling shows. Complex, if you are kind.'};
  if(pct>=20)return{label:'Diminished',color:'#c04a2a',desc:'Much lost. What remains is concentrated and strange.'};
  return{label:'The Last Drops',color:'#8a2a18',desc:'Barely a pour left. Worth more than gold.'};
}
// Enhanced beer bar showing condition
function beerBar(){
  const s=getStarter();
  const name=s?.name||'The Brew';
  const cond=brewCondition();
  return '<div class="beer-row">'
    +'<div class="beer-label">&#127866; '+name+'</div>'
    +'<div class="beer-track"><div class="beer-fill" style="width:'+G.beer+'%"></div></div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;min-width:80px">'
    +'<div class="beer-pct">'+Math.round(G.beer)+'%</div>'
    +'<div style="font-family:var(--pixel);font-size:6px;color:'+cond.color+'">'+cond.label+'</div>'
    +'</div></div>';
}


// ═══════════════════════════════════════════ MORALE SYSTEM
// 0-100. Starts at 70. Affects random event outcomes and daily health regen.
function initMorale(){G.morale=70;}
function morale(delta,reason){
  G.morale=Math.max(0,Math.min(100,G.morale+delta));
}
function moraleBar(){
  const m=G.morale||70;
  const col=m>=60?'#5aaa3a':m>=35?'#d4a830':'#c04a2a';
  const label=m>=75?'High spirits':m>=50?'Steady':m>=30?'Low':'Despair';
  return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-family:var(--mono);font-size:10px">'
    +'<span style="color:var(--dim);min-width:52px">Morale:</span>'
    +'<div style="flex:1;height:6px;background:var(--bg3);border:1px solid var(--border)">'
    +'<div style="width:'+m+'%;height:100%;background:'+col+'"></div></div>'
    +'<span style="color:'+col+';min-width:70px">'+label+'</span></div>';
}
// Low morale effects: applied during travelStretch
function applyMoraleEffects(){
  if(!G.morale)return;
  if(G.morale<30){
    // Despair: extra health drain and chance of equipment failure
    damageAll(3);
    if(Math.random()<0.2)G.supplies.parts=Math.max(0,G.supplies.parts-1);
  } else if(G.morale<50){
    // Low: mild health drain
    damageAll(1);
  } else if(G.morale>=75){
    // High: small passive heal
    healAll(2);
  }
}

// ═══════════════════════════════════════════ STARVATION SPIRAL
// Called each day when food=0. Escalates over time.
function starvationTick(){
  if(G.supplies.food>0)return;
  if(!G.starveDays)G.starveDays=0;
  G.starveDays++;
  morale(-5,'starvation');
  const dmg=G.starveDays<=2?5:G.starveDays<=4?10:G.starveDays<=6?15:20;
  damageAll(dmg);
  // Random infection from starvation
  if(G.starveDays>=3&&Math.random()<0.3)infectRandom('exhaustion');
  return G.starveDays;
}

// ═══════════════════════════════════════════ PERSISTENT WEATHER
// weather state: null | {type,daysLeft,dmgPerDay,dayPenalty}
function rollWeather(){
  if(G.weather&&G.weather.daysLeft>0)return; // already in weather
  const roll=Math.random();
  if(roll<0.12){G.weather={type:'storm',label:'Storm',daysLeft:rand(2,4),dmgPerDay:4,dayPenalty:1,color:'#8a8a9a'};}
  else if(roll<0.22){G.weather={type:'rain',label:'Heavy Rain',daysLeft:rand(1,3),dmgPerDay:2,dayPenalty:0,color:'#5a7a9a'};}
  else if(roll<0.28){G.weather={type:'heat',label:'Scorching Heat',daysLeft:rand(1,2),dmgPerDay:3,dayPenalty:0,color:'#c07a2a',foodPenalty:0.05};}
  else{G.weather=null;}
}
function tickWeather(){
  if(!G.weather)return null;
  G.weather.daysLeft--;
  damageAll(G.weather.dmgPerDay);
  if(G.weather.dayPenalty)G.day+=G.weather.dayPenalty;
  if(G.weather.foodPenalty)G.supplies.food=Math.max(0,G.supplies.food-Math.round(G.supplies.food*G.weather.foodPenalty));
  morale(-3,'bad weather');
  const type=G.weather.type;
  if(G.weather.daysLeft<=0)G.weather=null;
  return type;
}
function weatherBar(){
  if(!G.weather)return '';
  return '<div style="font-family:var(--mono);font-size:10px;color:'+G.weather.color+';padding:4px 12px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px">'
    +'&#9928; '+G.weather.label+' — '+G.weather.daysLeft+' day'+(G.weather.daysLeft!==1?'s':'')+' remaining (−'+G.weather.dmgPerDay+' health/day'+(G.weather.dayPenalty?', +1 day travel':'')+').'
    +'</div>';
}

}

// ═══════════════════════════════════════════ ILLNESS SYSTEM
const ILLNESSES=[
  {id:'marsh_fever',label:'Marsh Fever',dmgPerDay:4,note:'Caught in the wetlands. Fever and chills.'},
  {id:'mountain_chill',label:'Mountain Chill',dmgPerDay:3,note:'A deep cold from the high passes.'},
  {id:'orc_wound',label:'Orc Wound Infection',dmgPerDay:5,note:'The wound festers. Rest and athelas needed.'},
  {id:'exhaustion',label:'Exhaustion',dmgPerDay:2,note:'Too many days without rest.'},
  {id:'black_breath',label:'Black Breath',dmgPerDay:6,note:'From too close a brush with the Nazgul. Only athelas can treat it.'},
];
function infectRandom(illnessId){
  const all=[{name:G.playerName,isPlayer:true,health:G.health,status:(G.illnesses&&G.illnesses[G.playerName])||''},...G.companions.filter(c=>c.health>0)];
  const t=all[Math.floor(Math.random()*all.length)];
  if(!G.illnesses)G.illnesses={};
  if(!G.illnesses[t.name]){
    G.illnesses[t.name]=illnessId;
    return t.name;
  }
  return null;
}
function infectTarget(name,illnessId){
  if(!G.illnesses)G.illnesses={};
  G.illnesses[name]=illnessId;
}
function tickIllnesses(){
  if(!G.illnesses)return;
  Object.entries(G.illnesses).forEach(([name,id])=>{
    const ill=ILLNESSES.find(i=>i.id===id);
    if(!ill)return;
    if(name===G.playerName||name==='You'){
      G.health=Math.max(0,G.health-ill.dmgPerDay);
    } else {
      const c=G.companions.find(c=>c.name===name);
      if(c&&c.health>0)c.health=Math.max(0,c.health-ill.dmgPerDay);
      if(c&&c.health<=0){c.status='dead';delete G.illnesses[name];}
    }
  });
}
function illnessBar(){
  if(!G.illnesses||Object.keys(G.illnesses).length===0)return '';
  const lines=Object.entries(G.illnesses).map(([name,id])=>{
    const ill=ILLNESSES.find(i=>i.id===id)||{label:id};
    return '<div style="font-size:10px;color:#c04a2a;font-family:var(--mono);padding:1px 0">⚕ '+name+': <strong>'+ill.label+'</strong> (−'+ill.dmgPerDay+' health/day)</div>';
  }).join('');
  return '<div style="background:var(--bg3);border:1px solid #8a2a18;padding:6px 12px;margin-bottom:8px">'+lines+'</div>';
}
function useAthelas(targetName){
  if(!G.supplies.athelas||G.supplies.athelas<1){return false;}
  if(!G.illnesses||!G.illnesses[targetName])return false;
  G.supplies.athelas--;
  delete G.illnesses[targetName];
  const c=G.companions.find(c=>c.name===targetName);
  if(c)c.health=Math.min(c.maxHealth,c.health+20);
  if(targetName===G.playerName||targetName==='You')G.health=Math.min(G.maxHealth,G.health+20);
  return true;
}
function checkDeathsFromIllness(){
  // Returns array of names who just died from illness ticks
  const dead=[];
  G.companions.forEach(c=>{if(c.health<=0&&c.status!=='dead'){c.status='dead';dead.push(c.name);}});
  return dead;
}

function rollEquipmentFailure(nextFn){
  if(G.supplies.ponies<1){nextFn();return;}
  const roll=Math.random();
  if(roll<0.12){
    // Pony goes lame
    G.supplies.ponies=Math.max(0,G.supplies.ponies-1);
    const grainLost=rand(20,50);
    G.supplies.food=Math.max(0,G.supplies.food-grainLost);
    showEvent('PONY GONE LAME','One of the pack ponies pulls up lame on the trail. You cannot carry everything it was bearing.',false,'−1 pony · −'+grainLost+' lbs food.',nextFn);
  } else if(roll<0.22&&G.supplies.parts>0){
    // Part Pump Breaks — parts saves it
    G.supplies.parts--;
    showEvent('PARTY PUMP BREAKS','Your paty pump breaks, you manage to fix it using some spare parts.',true,'Spare part used to fix it. −1 part.',nextFn);
  } else if(roll<0.22){
    // Barrel fitting loose — no parts
    G.beer=Math.max(0,G.beer-rand(8,18));
    showEvent('BARREL FITTING LOOSE','A metal hoop on the barrel shifts. You have no spare parts. Some brew is lost before you can stop it.',false,'−brew%.',nextFn);
  } else if(roll<0.28&&G.supplies.parts>0){
    // Pack frame breaks — parts fixes it
    G.supplies.parts--;
    showEvent('PACK FRAME BREAKS','The wooden frame on one pony\'s pack cracks. Your Bartender lashes it back together with spare parts.',true,'−1 part. Maintenance saved the load.',nextFn);
  } else if(roll<0.28){
    // Pack frame breaks — no parts
    const lost=rand(30,70);G.supplies.food=Math.max(0,G.supplies.food-lost);
    showEvent('PACK FRAME BREAKS','The wooden frame on one pony\'s pack cracks. Half the load spills before you can catch it.',false,'−'+lost+' lbs food.',nextFn);
  } else {
    nextFn();
  }
}

function pickTravelEvent(){
  const total=TRAVEL_EVENTS.reduce((s,e)=>s+e.w,0);
  let r=Math.random()*total;
  for(const e of TRAVEL_EVENTS){r-=e.w;if(r<=0)return e;}
  return TRAVEL_EVENTS[0];
}
// Run 1-3 travel events between waypoints, then call nextFn
function travelStretch(numEvents,nextFn){
  window._lastEventExtra='';
  rollWeather();
  const events=[];
  for(let i=0;i<numEvents;i++){
    let ev,tries=0;
    do{ev=pickTravelEvent();tries++;}while(events.find(e=>e.id===ev.id)&&tries<20);
    events.push(ev);
  }
  // Gate: if morale is very low, add a morale event
  if((G.morale||70)<30&&Math.random()<0.5){
    events.push({id:'morale_low',w:0,title:'DESPAIR IN THE PARTY',
      text:'The road has broken something. Eyes are hollow. Nobody speaks. You push on anyway.',
      bad:true,fn:()=>{morale(-5,'deep despair');damageAll(3);}});
  }
  function runNext(){
    if(events.length===0){
      // Roll equipment failure before camp screen
      rollEquipmentFailure(function(){
      tickIllnesses();
      // Check illness deaths
      const newDead=G.companions.filter(x=>x.health<=0&&x.status!=='dead');
      if(newDead.length>0){
        const d=newDead[0];d.status='dead';
        const ill=G.illnesses&&G.illnesses[d.name]?ILLNESSES.find(i=>i.id===G.illnesses[d.name]):null;
        if(G.illnesses)delete G.illnesses[d.name];
        morale(-15,'companion died');
        showDeath(d.name,ill?'Died of '+ill.label+' on the road.':'Died from wounds on the road.',function(){runNext();});
        return;
      }
      // Show camp screen before arriving at destination
      showCampScreen(nextFn);
      });  // end rollEquipmentFailure
      return;
    }
    const ev=events.shift();
    window._lastEventExtra='';
    ev.fn();
    const extra=window._lastEventExtra||'';
    applyMoraleEffects();
    const sfxParts=[];
    if(ev.id==='rain')sfxParts.push('+1 day, all -4 health');
    if(ev.id==='fog')sfxParts.push('+1 day');
    if(ev.id==='heat')sfxParts.push('Food spoiled, all -5 health');
    if(ev.id==='fair')sfxParts.push('-1 day');
    if(ev.id==='stream')sfxParts.push('All +6 health');
    if(ev.id==='shortcut')sfxParts.push('-1 day');
    if(ev.id==='eagle')sfxParts.push('All +5 health');
    if(ev.id==='abandoned')sfxParts.push('Food and coin found');
    if(ev.id==='merchant')sfxParts.push('Trader on the road');
    if(extra)sfxParts.push(extra);
    _nextFn=runNext;
    R(frame(ev.title,G.location+' — Day '+G.day,
      statusBar()+nextLandmark()+beerBar()+moraleBar()+milesBar()+weatherBar()+partyHealth()+illnessBar()+
      '<div class="event-box"><div class="'+(ev.bad?'outcome-bad':'outcome-good')+'">'+ev.text+'</div>'+(sfxParts.length?'<div class="outcome-suffix">'+sfxParts.join(' · ')+'</div>':'')+'</div>',
      '<button class="btn-primary" onclick="_continue()">Continue →</button>'
    ));
  }
  runNext();
}


// ═══════════════════════════════════════════ MERCHANT SHOP
window._merchantPending=false;
const _origContinue=window._continue;
window._continue=function(){
  if(window._merchantPending){
    window._merchantPending=false;
    showMerchantShop();
    return;
  }
  if(_nextFn){const f=_nextFn;_nextFn=null;f();}
};
function showMerchantShop(){
  const items=[
    {label:'Food (50 lbs)',key:'food',amt:50,cost:15},
    {label:'Spare Part',key:'parts',amt:1,cost:20},
    {label:'Athelas (1)',key:'athelas',amt:1,cost:25},
  ];
  const rows=items.map((it,i)=>{
    const canAfford=G.supplies.coin>=it.cost;

      +'<span style="font-family:var(--pixel);font-size:8px;color:var(--gold)">'+it.cost+' coin</span>'
      +(canAfford
        ?'<button class="btn-primary" style="padding:6px 14px" onclick="merchantBuy('+i+')">Buy</button>'
        :'<span style="font-family:var(--pixel);font-size:7px;color:var(--dim)">Cannot afford</span>')
      +'</div></div>';
  }).join('');

    statusBar()
    +'<p>He eyes your keg with interest but says nothing about it. His pack holds a few useful things.</p>'
    +'<p style="font-family:var(--pixel);font-size:8px;color:var(--gold)">You have: '+G.supplies.coin+' coin</p>'

    '<button class="btn-primary" onclick="_merchantDone()">Move on</button>'

}
window.merchantBuy=function(i){
  const it=window._merchantItems[i];
  if(!it||G.supplies.coin<it.cost)return;
  G.supplies.coin-=it.cost;
  G.supplies[it.key]=(G.supplies[it.key]||0)+it.amt;
  showMerchantShop();
};
window._merchantDone=function(){if(_nextFn){const f=_nextFn;_nextFn=null;f();}};
// ═══════════════════════════════════════════ TREAT SICK SCREEN
function showTreatSick(nextFn){
  if(!G.illnesses||Object.keys(G.illnesses).length===0){nextFn();return;}
  const names=Object.keys(G.illnesses);
  const btns=names.map(name=>{
    const id=G.illnesses[name];
    const ill=ILLNESSES.find(i=>i.id===id)||{label:id,note:''};

      +'<div style="font-size:11px;color:var(--dim);font-family:var(--serif);margin:4px 0">'+ill.note+'</div>'
      +(G.supplies.athelas>0?'<button class="choice-btn" onclick="treatOne(\''+name+'\')"><span class="num">&#9877;</span> Use athelas on '+name+'<span class="note">Cures illness +20 health -1 athelas (have '+G.supplies.athelas+')</span></button>':'<div style="font-size:10px;color:var(--dim);padding:4px 0">No athelas remaining.</div>')
      +'</div>';
  }).join('');

    statusBar()+beerBar()+partyHealth()+
    '<p>These party members are ill. Untreated illness deals damage every day of travel.</p>'
    +btns,
    '<button class="btn-primary" onclick="_continue()">Continue without treating →</button>'
  ));
}
window.treatOne=function(name){

    showEvent('ATHELAS APPLIED',name+' breathes easier. The fever breaks. Their colour returns.',true,name+' cured. −1 athelas.',function(){showTreatSick(_nextFn);});

};

window.doPurchase=function(){let t=0;const buys={};SHOP_ITEMS.forEach(it=>{const v=parseInt(document.getElementById('buy_'+it.key)?.value||0);buys[it.key]=v;t+=v*it.price;});if(Math.round(t)>G.supplies.coin){showSupplyShop(G.location,'',G.shopDoneFn,'Not enough coin!');return;}G.supplies.coin-=Math.round(t);SHOP_ITEMS.forEach(it=>{G.supplies[it.key]=(G.supplies[it.key]||0)+buys[it.key];});G.shopDoneFn();};

// ═══ DECISION 1: MAIN ROAD vs CROSS-COUNTRY ═══════════════════════════
function decision1(){
  G.location='East of Hobbiton';
  R(frame('THE SHIRE — DAY '+G.day,'Road to the Brandywine Bridge',
    statusBar()+beerBar()+partyHealth()+paceControl()+
    `<p>The East Road passes through Hobbiton, Bywater, Frogmorton, and Stock before reaching the Brandywine Bridge. Comfortable, perhaps too comfortable — the Shire's finest pubs line the way. Or you could cut across the fields and hills of the Shire.</p>`+
    choices([
      {label:'Take the East Road to the Brandywine Bridge',note:'Safe · +3 days · Risk of pub delays · Green Dragon, Ivy Bush, Golden Perch, Floating Log',fn:"chooseD1('road')"},
      {label:'Cut cross-country through the Shire',note:'+1 day · Risk of getting lost or chased off · No pub stops',fn:"chooseD1('country')"},
    ])
  ));
}

const SHIRE_PUBS=[
  {name:'The Green Dragon',loc:'Bywater',text:'The smell of pipe-weed and good ale stops your feet at the Green Dragon in Bywater. The barman says the next round is on him. One round becomes three.',cost:2},
  {name:'The Ivy Bush',loc:'Hobbiton',text:'A round at the Ivy Bush turns into a long evening of Shire gossip. '+G.playerName+' loses count of the tankards.',cost:1},
  {name:'The Golden Perch in Stock',loc:'Stock',text:'"Best beer in the Eastfarthing," says Merry — and he\'s right. The Golden Perch delays you well into the next morning.',cost:2},
  {name:'The Floating Log',loc:'Frogmorton',text:'The Floating Log\'s landlord won\'t let you leave without trying the new barrel. A warm evening. A late start tomorrow.',cost:1},
];
function chooseD1(c){
  G.pathFlags.d1=c;
  if(c==='road'){
    // Check for pub encounters along the road
    let pubDays=0;let pubMessages=[];
    SHIRE_PUBS.forEach(pub=>{
      if(Math.random()<0.5){pubDays+=pub.cost;pubMessages.push(`<strong>${pub.name}</strong> in ${pub.loc}: +${pub.cost} day${pub.cost>1?'s':''} lost.`);}
    });
    advance(3+pubDays);
    addNote('unhurried, following familiar roads');
    if(pubMessages.length>0){
      showEvent('THE EAST ROAD — PUB STOPS',
        `The East Road is well-travelled — perhaps too well. You stop at ${pubMessages.length} pub${pubMessages.length>1?'s':''} along the way.<br><br>${pubMessages.join('<br>')}`,
        false,`+${pubDays} extra day${pubDays>1?'s':''} lost to the finest hospitality in the Shire.`,function(){travelStretch(1,decision2);});
    } else {
      showEvent('THE EAST ROAD','A determined march. The ponies keep good time and the party manages to walk straight past every inn. You reach the Brandywine Bridge ahead of schedule.',true,'',function(){travelStretch(1,decision2);});
    }
  } else {
    advance(1);
    const roll=Math.random();
    if(roll<0.25){
      // Chased off by a farmer
      advance(1);
      showEvent('TRESPASSING!',`An angry Shire farmer comes running out of his field waving a pitchfork. "Get yer ponies off my barley!" You scatter and lose an afternoon finding the path again.`,false,'+1 day lost.',function(){travelStretch(1,decision2);});
    } else if(roll<0.5){
      // Got lost
      advance(2);const v=damageRandom(8);
      showEvent('LOST IN THE SHIRE',`The forest north of woodhall swallow two extra days. Every path looks the same. ${v?.name||'A companion'} is exhausted from the detour.`,false,'Travel time +2 days.',function(){travelStretch(1,decision2);});
    } else {
      showEvent('CROSS-COUNTRY','The fields are clear. You reach the Brandywine a full day ahead of the road route, bypassing every inn.',true,'',function(){travelStretch(1,decision2);});
    }
  }
}

// ═══ DECISION 2: BRANDYWINE CROSSING ═════════════════════════════════
function decision2(){
  G.location='Brandywine River';addMiles(80);
  // Timing notes based on d1 path
  const ferryNote=G.pathFlags.d1==='road'?'Costs 20 coin · Safe · No time cost since you\'re already on this road':'Costs 20 coin · Safe crossing';
  const bridgeNote=G.pathFlags.d1==='road'?'Free · No extra time cost if you took the East Road · Safest option':'+2 days · Free · Completely safe';
  const roadBonus=G.pathFlags.d1==='road'?'<p style="color:#5aaa3a;font-size:12px">You came by the East Road — the bridge and ferry are both on your route, saving you extra detour time.</p>':'';
  R(frame('BRANDYWINE RIVER — DAY '+G.day,'The river is wide. The current is strong.',
    statusBar()+beerBar()+partyHealth()+
    '<p>The Brandywine runs swift — about four feet deep at the crossing, eighty feet wide. The Bucklebury Ferry sits at the dock. North lies the Brandywine Bridge.</p>'+
    roadBonus+
    choices([
      {label:'Attempt to ford the river',note:'Free · Risk of supply loss or injury',fn:"chooseD2('ford')"},
      {label:'Pay for the Bucklebury Ferry',note:ferryNote,fn:"chooseD2('ferry')"},
      {label:'Detour north to Brandywine Bridge',note:bridgeNote,fn:"chooseD2('bridge')"},
    ])
  ));
}
function chooseD2(c){
  G.pathFlags.d2=c;
  if(c==='ford'){
    if(Math.random()<0.4){
      const lost=40+rand(0,60);G.supplies.food=Math.max(0,G.supplies.food-lost);
      const v=damageRandom(15);if(v)v.status='injured leg';
      showEvent('FORDING THE BRANDYWINE',`The current catches the lead pony. ${lost} lbs of food swept away. ${v?.name||'A companion'} slips on the stones and twists their leg.`,false,`${v?.name||'They'} will suffer a movement penalty until rested at a town.`,function(){travelStretch(1,decision3);});
    } else {
      showEvent('FORDING THE BRANDYWINE','Cold and wet but everyone makes it across. Nothing lost.',true,'',function(){travelStretch(1,decision3);});
    }
  } else if(c==='ferry'){
    if(G.supplies.coin<20){showEvent('BUCKLEBURY FERRY','The ferryman shakes his head. Not enough coin.',false,'',decision2);return;}
    // Ferry on road path costs no extra time; cross-country adds no time either (already factored)
    G.location='Bucklebury Ferry';
    R(frame('BUCKLEBURY FERRY — DAY '+G.day,'Old Gorgo the ferryman eyes your keg.',
      statusBar()+beerBar()+
      `<p>"That's a fine smell off that keg," he says. "I'd take a taste of that over coin, I would."</p>`+
      choices([
        {label:'Pay the 20 coin and say nothing',fn:'ferryPay()'},
        {label:'Offer him a pour (−5% brew) for free passage',note:'Saves 20 coin',fn:'ferryBeer()'},
      ])
    ));
  } else {
    // Bridge is free of extra time if you used the main road
    const extraDays=G.pathFlags.d1==='road'?0:2;
    if(extraDays>0)advance(extraDays);
    showEvent('BRANDYWINE BRIDGE',extraDays>0?'The two-day detour north is uneventful. You cross the ancient stone bridge and head south to rejoin the road.':'You were already heading north along the main road. The ancient bridge is right on your route — no detour needed.',true,'',function(){travelStretch(1,decision3);});
  }
}
window.ferryPay=function(){G.supplies.coin-=20;showEvent('BUCKLEBURY FERRY','You pay and cross without incident. The ferry makes quick work of the crossing.',true,'',function(){travelStretch(1,decision3);});};
window.ferryBeer=function(){useBeer(5,'Bucklebury ferryman');showEvent('BUCKLEBURY FERRY','Gorgo takes a long pull, eyes wide. He waves you across for free, smiling broadly.',true,'−5% brew · 20 coin saved.',function(){travelStretch(1,decision3);});};

// ═══ DECISION 3: OLD FOREST vs MAIN ROAD ═════════════════════════════
function decision3(){
  G.location='Buckland Gate';addMiles(30);
  R(frame('BUCKLAND GATE — DAY '+G.day,'The Old Forest or the long road?',
    statusBar()+beerBar()+partyHealth()+
    `<p>The Old Forest lies directly ahead — a shortcut, if you trust it. Something old and wilful lives among those trees. The main road swings north and then east through the grasslands to Bree — two days longer, but with occasional company on the road.</p>`+
    choices([
      {label:'Enter the Old Forest',note:'Shorter · Dangerous if lost',fn:"chooseD3('forest')"},
      {label:'Take the main road east to Bree',note:'+2 days · Chance of brigands or traders',fn:"chooseD3('road')"},
    ])
  ));
}
function chooseD3(c){
  G.pathFlags.d3=c;
  if(c==='forest'){
    advance(1);addNote('earthy undertones, faintly mossy, touched by something ancient');
    const roll=Math.random();
    if(roll<0.4){
      // Tom Bombadil — great outcome
      G.pathFlags.metTom=true;addAch('tom','Met Tom Bombadil in the Old Forest');
      healAll(5);morale(20,'tom bombadil');
      showEvent('TOM BOMBADIL','"Hey dol! merry dol! ring a dong dillo!" He appears from nowhere, his boots yellow as butter, jacket bright blue. He leads you safely through the Withywindle, singing all the way. Everyone arrives fed and rested.',true,'All party members +5 health. Tom Bombadil remembered.',function(){travelStretch(2,reachBree);});
    } else if(roll<0.7){
      // Lost, possible Barrow Downs
      advance(2);const v=damageRandom(20);
      if(Math.random()<0.3){
        // Barrow Downs — rescued by Tom if met, severe damage if not
        if(G.pathFlags.metTom){
          healAll(5);
          showEvent('THE BARROW DOWNS',`You stumble out of the forest into dense cold fog. The Barrow-wights circle you — but Tom Bombadil's voice rings out from somewhere. "Tom Bombadil is Master!" The cold lifts. He pulls you free.`,true,'Tom saved you from the Barrow Downs.',function(){travelStretch(2,reachBree);});
        } else {
          damageAll(30);morale(-15,'barrow downs');const v2=damageRandom(40);
          showEvent('THE BARROW DOWNS',`Cold mist swallows the path. You wake in a barrow, ancient swords pressed to your throats. Somehow — barely — you break free. ${v2&&v2.health<=0?v2.name+' did not make it out.':'Everyone survives, barely.'}`,false,'Very dangerous. Much health lost.',function(){travelStretch(2,reachBree);});
        }
      } else {
        showEvent('LOST IN THE OLD FOREST',`The trees lean in. Paths twist back on themselves. ${v?.name||'A companion'} is caught by a willow root and dragged partway into the mud before you pull them free.`,false,`${v?.name||'They'} is shaken and injured. +2 days.`,function(){travelStretch(2,reachBree);});
      }
    } else {
      // Weird but fine
      showEvent('THE OLD FOREST','The trees murmur. Something watches you the whole way through. But the path never quite closes. You emerge at Bree, unsettled but unharmed.',true,'',function(){travelStretch(2,reachBree);});
    }
  } else {
    advance(2);
    const roll=Math.random();
    if(roll<0.25){
      const lost=rand(20,50);G.supplies.food=Math.max(0,G.supplies.food-lost);
      showEvent('BRIGANDS ON THE ROAD',`A group of rough men step out from the trees. You surrender ${lost} lbs of food before they disappear back into the wood.`,false,`−${lost} lbs food.`,function(){travelStretch(2,reachBree);});
    } else if(roll<0.5){
      G.supplies.food+=rand(30,60);G.supplies.coin+=rand(10,25);
      showEvent('MERCHANTS ON THE ROAD','A cheerful wagon train heading west. They trade fairly — food and coin change hands to everyone\'s satisfaction.',true,'+food, +coin.',function(){travelStretch(2,reachBree);});
    } else {
      showEvent('THE LONG ROAD','The long road to Bree is grey and uneventful. You arrive at Bree without incident.',true,'',function(){travelStretch(2,reachBree);});
    }
  }
}

// ═══ BREE ════════════════════════════════════════════════════════════
function reachBree(){
  G.location='Bree';
  healAll(15);morale(12,'reached Bree');
  G.companions.forEach(c=>{if(c.status==='injured leg'){c.status='';c.maxHealth=100;}});G.maxHealth=100;
  // Clear exhaustion at a proper rest stop

// ═══ DECISION 4: MAIN ROAD vs MIDGEWATER MARSHES / WEATHER HILLS ═════
function decision4(){
  G.location='East of Bree';
  R(frame('EAST OF BREE — DAY '+G.day,'The Lone-lands stretch ahead',
    statusBar()+beerBar()+partyHealth()+paceControl()+
    `<p>East of Bree the road grows emptier. The main East Road leads safely toward Weathertop. Or you could cut through the Midgewater Marshes and over the Weather Hills — shorter but miserable in different ways.</p>`+
    choices([
      {label:'Follow the East Road toward Weathertop',note:'+3 days · Higher chance of brigands · Small chance of traders',fn:"chooseD4('road')"},
      {label:'Strike out through the Midgewater Marshes and Weather Hills',note:'+2 days · Ranger encounter in the hills · Marsh slows you · Insects = health loss',fn:"chooseD4('wilds')"},
    ])
  ));
}
function chooseD4(c){
  G.pathFlags.wilds=c==='wilds';

    advance(3);

      const lost=rand(20,60);G.supplies.food=Math.max(0,G.supplies.food-lost);
      showEvent('BRIGANDS ON THE EAST ROAD',`Armed men appear from the gorse. They take ${lost} lbs of food and make off before you can respond.`,false,`−${lost} lbs food.`,function(){travelStretch(2,weathertop);});
    } else if(roll<0.45){
      G.supplies.food+=rand(40,80);G.supplies.coin+=rand(15,30);
      showEvent('TRADERS ON THE ROAD','A merchants\' convoy heading west. They have food and coin to spare and are glad of company on the empty road.',true,'+food, +coin.',function(){travelStretch(2,weathertop);});
    } else {
      showEvent('THE LONE-LANDS ROAD','Three days of grey sky and empty road. You arrive at Weathertop on schedule.',true,'',function(){travelStretch(2,weathertop);});
    }

    advance(1);
    midgewaterMarshes();
  }

function midgewaterMarshes(){
  G.location='Midgewater Marshes';advance(1);
  const roll=Math.random();
  let marshText,marshGood,marshSuffix,marshdmg=0;

    advance(1);marshdmg=rand(8,15);damageAll(marshdmg);

    marshText='The Neekerbreekers. All night, every night. The insects are everywhere — biting, crawling.'+(mfName?' '+mfName+' comes down with a fever by morning.':' Everyone emerges sick with bites.')+' An extra day lost.';
    marshGood=false;marshSuffix='+1 day. All −'+marshdmg+' health.'+(mfName?' Marsh Fever: '+mfName+'.':'');
  } else if(roll<0.65){
    marshdmg=rand(5,10);damageAll(marshdmg);
    marshText=`The marshes are as unpleasant as advertised. The Neekerbreekers keep you awake. Everyone arrives at the far edge looking haggard.`;
    marshGood=false;marshSuffix=`All −${marshdmg} health.`;

    marshText=`The marshes are foul but passable. The Neekerbreekers sing all night but nobody falls ill. You wade through faster than expected.`;

function weatherHills(){

    showEvent('STRIDER IN THE WEATHER HILLS','A tall hooded figure stands on the ridge above you, watching. He waits until you nearly pass, then speaks. Strider. He scouts ahead and leads you safely to Weathertop. He knows these hills.',true,'+60 food. +12 health. Strider remembered.',function(){travelStretch(2,weathertop);});
  } else if(roll<0.8){
    const v=damageRandom(18);
    showEvent('WARGS IN THE WEATHER HILLS',`Camp is hit at midnight. You fight them off with torches — but ${v?.name||'a companion'} takes a gash before you can.`,false,'',function(){travelStretch(2,weathertop);});
  } else {
    showEvent('THE WEATHER HILLS','Steep going but clear. The hills offer a good view back over the marshes. Nobody is following. You descend to Weathertop before nightfall.',true,'',function(){travelStretch(2,weathertop);});
  }
}

    {title:'LIVE TROLLS',text:'You smell them before you see them — two hill-trolls fighting over a sheep. They notice you. You run.',good:false,sfx:'-15 health.',fn:()=>{damageAll(15);}},
    {title:'BROKEN PONY',text:'One pony goes lame on the rocky road. You cannot carry everything. Hard choices must be made.',good:false,sfx:'-1 pony, food lost.',fn:()=>{G.supplies.ponies=Math.max(0,G.supplies.ponies-1);G.supplies.food=Math.floor(G.supplies.food*0.82);}},
    {title:'ROCKFALL',text:hasRole('maintenance')?`A section of old road crumbles. ${G.companions.find(c=>c.rk==='maintenance'&&c.health>0)?.name||'Your maintenance hand'} secures the barrel before it rolls. Nothing lost.`:'A section of old road crumbles. The barrel rolls and takes a knock.',good:hasRole('maintenance'),sfx:hasRole('maintenance')?'':'-10% brew.',fn:()=>{if(!hasRole('maintenance'))G.beer=Math.max(0,G.beer-10);}},
    {title:'SHELTERED CAMP',text:'A deep dell with a cold spring and dry wood. A full night of uninterrupted rest. Everyone wakes with colour in their cheeks.',good:true,sfx:'+12 health.',fn:()=>healAll(12)},
    {title:'ORC SCOUTS',text:'A small band of orc scouts finds your camp at dusk. You drive them off after a brief, brutal skirmish.',good:false,sfx:'Companion injured.',fn:()=>{damageRandom(15);}},
    {title:'RANGER STASH',text:'A flat stone with three carvings on it. You know what it means — a ranger cache. Beneath it: wrapped food, a skin of oil, a note in Elvish.',good:true,sfx:'+60 food, +1 parts.',fn:()=>{G.supplies.food+=60;G.supplies.parts+=1;}},
    {title:'BEAR IN THE SUPPLIES',text:'You wake to chaos. A bear has found your food sacks. By the time you drive it off with torches and noise, real damage is done.',good:false,sfx:'Food and brew damaged.',fn:()=>{G.supplies.food=Math.max(0,G.supplies.food-rand(40,80));G.beer=Math.max(0,G.beer-rand(5,15));}},
    {title:'ROUGH TRAIL',text:'The old road crumbles to almost nothing. The ponies struggle. Everyone pushes, pulls, and curses their way through.',good:false,sfx:'-1 day extra, all -5 health.',fn:()=>{advance(1);damageAll(5);}},

    if(Math.random()<0.5){
      healAll(15);G.supplies.food+=80;
      showEvent('TREEBEARD','He decides you are not Orcs. Ent-draughts and a sack of food. "Do not be hasty," he says, then watches you leave.',true,'+80 food. +15 health to all.',function(){travelStretch(2,reachEdoras);});
    } else {
      damageAll(10);advance(2);
      showEvent('LOST IN FANGORN','The trees whisper. Nothing attacks but nothing helps. You emerge from the southern edge two days behind.',false,'All −10 health. +2 days.',function(){travelStretch(2,reachEdoras);});
    }
  }
}

// ═══════════════════════════════════════════ FORDS OF ISEN (Gap of Rohan)
function fordsOfIsen(){
  G.location='Fords of Isen';
  const crebainSpotted=Math.random()<0.4;
  G.pathFlags.crebainSeen=crebainSpotted;
  const crebainWarn=crebainSpotted?'<p style="color:#c04a2a">A flock of black crows wheels overhead — crebain, out of Dunland. Saruman\'s spies.</p>':''  ;
  const isenChoices=crebainSpotted?choices([
    {label:'Hide under the trees until they pass',note:'+1 day · Saruman may not notice you',fn:'isenHide()'},
    {label:'Move on quickly — cross the river now',note:'Saruman may take note of you',fn:'isenCross()'},
  ]):choices([
    {label:'Ford the river now',note:'Free · Risk of injury',fn:"chooseIsen('ford')"},
    {label:'Wait for the water to drop',note:'+2 days · Safer crossing',fn:"chooseIsen('wait')"},
    {label:'Build a raft and float the barrel across',note:'Risk to the brew · Faster',fn:"chooseIsen('raft')"},
  ]);
  R(frame('FORDS OF ISEN — DAY '+G.day,'The river runs fast with snowmelt.',
    statusBar()+beerBar()+partyHealth()+
    '<p>The Isen runs cold and strong. Orthanc looms on the horizon — Saruman\'s tower.</p>'+
    crebainWarn+isenChoices
  ));
}
window.isenHide=function(){
  advance(1);
  showEvent('HIDING FROM THE CREBAIN','You pull the ponies under the trees and wait in silence. The crebain circle twice, then fly north. Saruman may not have seen you.',true,'+1 day, but safely hidden.',isenCrossChoice);
};
window.isenCrossChoice=function(){
  G.location='Fords of Isen';
  R(frame('FORDS OF ISEN — DAY '+G.day,'The crebain are gone. The river remains.',
    statusBar()+beerBar()+partyHealth()+
    '<p>The Isen runs cold and strong. Time to cross.</p>'+
    choices([
      {label:'Ford the river now',note:'Free · Risk of injury',fn:"chooseIsen('ford')"},
      {label:'Wait for the water to drop',note:'+2 days · Safer crossing',fn:"chooseIsen('wait')"},
      {label:'Build a raft and float the barrel across',note:'Risk to the brew · Faster',fn:"chooseIsen('raft')"},
    ])
  ));
};
window.isenCross=function(){
  if(G.pathFlags.crebainSeen&&Math.random()<0.35){
    damageAll(12);G.supplies.food=Math.max(0,G.supplies.food-rand(30,60));
    showEvent('SARUMAN\'S INTERFERENCE','A Dunlending patrol meets you at the ford — no accident. Someone was watching. You fight them off but pay for it.',false,'All −12 health. Food lost.',function(){travelStretch(2,reachEdoras);});
  } else {
    isenCrossChoice();
  }
};
function chooseIsen(c){
  if(c==='ford'){
    if(Math.random()<0.4){const v=damageRandom(20);showEvent('FORDING THE ISEN',`The current takes ${v?.name||'a companion'} off their feet. Bruised and soaked on the far bank.`,false,'',function(){travelStretch(2,reachEdoras);});}
    else showEvent('FORDING THE ISEN','Cold and fast but everyone across intact.',true,'',function(){travelStretch(2,reachEdoras);});
  } else if(c==='wait'){
    advance(2);showEvent('WAITING AT THE ISEN','Two days camped at the bank. The water drops. You cross safely.',true,'',function(){travelStretch(2,reachEdoras);});
  } else {
    if(Math.random()<0.45){G.beer=Math.max(0,G.beer-15);showEvent('THE RAFT','The raft tips in the current. You save the barrel — barely.',false,'−15% brew.',function(){travelStretch(2,reachEdoras);});}
    else showEvent('THE RAFT','The barrel crosses dry. Everyone swims. Cold but successful.',true,'',function(){travelStretch(2,reachEdoras);});
  }
}

// ═══════════════════════════════════════════ EDORAS
function reachEdoras(){
  G.location='Edoras';addMiles(380);healAll(20);morale(12,'reached Edoras');
  G.companions.forEach(c=>{if(c.health>0&&c.status==='injured leg'){c.status='';c.maxHealth=100;}});G.maxHealth=100;
  R(frame('EDORAS — MEDUSELD','Day '+G.day+' · The Golden Hall of Rohan',
    statusBar()+beerBar()+partyHealth()+
    `<p>The Golden Hall sits atop its hill, banners streaming. All party members recover 20 health. Injuries from before Rohan have mended.</p>
    <p>A rider eyes your barrel. "We have mead. But that smells better than mead."</p>`+
    choices([
      {label:'Buy supplies at the Edoras market',fn:'edorasShop()'},
      {label:'Talk to the Rohirrim',note:'Hear about the road to Minas Tirith',fn:"showTownTalk('edoras',minasRoad)"},
      {label:'Offer the Rohirrim a taste (−6% brew) for a road escort',note:'Saves trouble on the road to Minas Tirith',fn:'edorasBeer()'},
      {label:'Continue east to Minas Tirith',fn:'minasRoad()'},
    ])
  ));
}
window.edorasShop=function(){showSupplyShop('Edoras','The Edoras market stocks the essentials.',minasRoad);};
window.edorasBeer=function(){
  useBeer(6,'the Rohirrim at Edoras');healAll(10);
  showEvent('THE ROHIRRIM ESCORT','Three riders accompany you east. The road to Minas Tirith is clear.',true,'+10 health from the safe escort.',function(){travelStretch(1,reachMinasTirith);});
};
function minasRoad(){
  advance(2);
  if(Math.random()<0.3){
    damageAll(10);
    showEvent('RAID ON THE PELENNOR ROAD','Orcs hit your camp the night before Minas Tirith. You drive them off.',false,'All −10 health.',function(){travelStretch(1,reachMinasTirith);});
  } else {
    showEvent('THE ROAD TO MINAS TIRITH','Two days on the Pelennor. White walls visible from miles away.',true,'',function(){travelStretch(1,reachMinasTirith);});
  }
}

// ═══════════════════════════════════════════ MINAS TIRITH
function reachMinasTirith(){
  G.location='Minas Tirith';addMiles(220);healAll(25);morale(15,'reached Minas Tirith');G.illnesses={};
  R(frame('MINAS TIRITH — THE WHITE CITY','Day '+G.day+' · Last rest. Last supplies.',
    statusBar()+beerBar()+partyHealth()+
    `<p>The seven-tiered city rises before you. All party members recover 25 health. This is the last stop before Mordor.</p>
    <p>The road ahead splits three ways into the shadow. Choose carefully.</p>`+
    choices([
      {label:'Buy supplies — this is the last chance',fn:'mtShop()'},
      {label:'Choose your road into Mordor',fn:'decision8()'},
    ])
  ));
}
window.mtShop=function(){showSupplyShop('Minas Tirith','Last supply stop. Spend wisely.',decision8);};

// ═══════════════════════════════════════════ DECISION 8 — INTO MORDOR
function decision8(){
  G.location='Gates of Mordor';
  R(frame('THE ROAD INTO MORDOR — DAY '+G.day,'Three roads. None of them safe.',
    statusBar()+beerBar()+partyHealth()+
    `<p>Mordor. The sky is red. The air tastes of ash. Orodruin burns somewhere ahead. Three approaches — each with its own danger and its own length.</p>`+
    choices([
      {label:'North — Dead Marshes to the Morannon',note:'Medium speed · Marsh events · Black Gate confrontation',fn:"chooseD8('north')"},
      {label:'East — Minas Morgul and Cirith Ungol',note:'Fastest · Shelob risk · Most dangerous',fn:"chooseD8('east')"},
      {label:'South — Ford the Poros, through Ephel Dúath to Orodruin',note:'Slowest · River crossing · Avoids Shelob · Different dangers',fn:"chooseD8('south')"},
    ])
  ));
}
function chooseD8(c){
  G.pathFlags.d8=c;
  if(c==='north'){
    addNote('murky and complex, something haunted in the depth');advance(5);
    if(Math.random()<0.5){
      const v=damageRandom(25);
      showEvent('THE DEAD MARSHES',`The faces in the pools. ${v?.name||'A companion'} wanders toward one of the lights before you drag them back.`,false,'',function(){travelStretch(2,blackGate);});
    } else {
      damageAll(8);
      showEvent('THE DEAD MARSHES','The marshes are terrible but passable. You keep your eyes up and your feet on the path.',false,'All −8 health.',function(){travelStretch(2,blackGate);});
    }
  } else if(c==='east'){
    addNote('tense acidity, sharp and unforgiving, a spider-thread edge to every sip');advance(3);
    if(Math.random()<0.55){
      const v=G.companions.find(x=>x.health>0);
      if(v){v.health=0;v.status='dead';}
      showEvent('SHELOB\'S LAIR',`She drops from the ceiling in total darkness. ${v?.name||'A companion'} is taken before anyone can react. You drive her back with torchlight.`,false,`${v?.name||'A companion'} has fallen.`,function(){travelStretch(2,mountDoomApproach);});
    } else {
      showEvent("CIRITH UNGOL",'Something breathes in the dark tunnel. But the torch keeps her back. You emerge onto Gorgoroth.',true,'',function(){travelStretch(2,mountDoomApproach);});
    }
  } else {
    addNote('a long southern warmth, rounded and unhurried, the road less travelled');advance(7);
    if(Math.random()<0.4){
      const lost=Math.floor(G.supplies.food*0.2);G.supplies.food-=lost;damageAll(10);
      showEvent('THE FORD OF POROS',`The Poros runs deep. ${lost} lbs of food lost in the crossing.`,false,'All −10 health.',ephel);
    } else {
      showEvent('THE FORD OF POROS','The ford is passable. Cold and deep but nobody falls.',true,'',ephel);
    }
  }
}
function ephel(){
  advance(3);damageAll(12);
  showEvent('THE EPHEL DÚATH','The southern passes of the Mountains of Shadow. Ash, heat, the smell of sulphur. You climb north toward Orodruin.',false,'All −12 health.',function(){travelStretch(2,mountDoomApproach);});
}

// ═══════════════════════════════════════════ BLACK GATE
function blackGate(){
  G.location='The Morannon';
  R(frame('THE MORANNON — DAY '+G.day,'The Black Gate stands before you.',
    statusBar()+beerBar()+partyHealth()+
    `<p>The great iron gates, massive beyond reason. Briefly open as a column of Orcs marches through.</p>`+
    choices([
      {label:'Slip through in the shadow of the column',note:'Very high risk · Direct',fn:"morannon('slip')"},
      {label:'Roll the barrel as a distraction (−20% brew)',note:'Medium risk · Guards go for the beer',fn:"morannon('beer')"},
      {label:'Find a crack in the northern wall',note:'+1 day · Avoids the gate · Still risky',fn:"morannon('crack')"},
    ])
  ));
}
function morannon(c){
  if(c==='slip'){
    if(Math.random()<0.55){damageAll(30);showEvent('THE MORANNON','An eye turns. You run. Most make it through but the alarm is raised.',false,'All −30 health.',function(){travelStretch(2,mountDoomApproach);});}
    else showEvent('THE MORANNON','Shadow and silence. The column passes. You slip through unseen.',true,'',function(){travelStretch(2,mountDoomApproach);});
  } else if(c==='beer'){
    useBeer(20,'distraction at the Morannon');
    showEvent('THE MORANNON','The barrel bursts open. The guards scramble toward the smell. You cross in the confusion.',true,'−20% brew. Worth it.',function(){travelStretch(2,mountDoomApproach);});
  } else {
    advance(1);
    if(Math.random()<0.35){damageAll(15);showEvent('THE CRACK IN THE WALL','You find the gap but so does a patrol. You fight through.',false,'All −15 health.',function(){travelStretch(2,mountDoomApproach);});}
    else showEvent('THE CRACK IN THE WALL','A narrow gap. One by one you squeeze through into Mordor.',true,'',function(){travelStretch(2,mountDoomApproach);});
  }
}

// ═══════════════════════════════════════════ MOUNT DOOM APPROACH
function mountDoomApproach(){
  G.location='Plateau of Gorgoroth';advance(2);damageAll(10);
  R(frame('GORGOROTH — DAY '+G.day,'Orodruin burns on the horizon.',
    statusBar()+beerBar()+partyHealth()+
    `<p>The Plateau of Gorgoroth. Nothing lives here. The ground is black and the sky is red. You are nearly there. The brew is nearly there.</p>
    ${G.beer<25?'<p style="color:#c04a2a">The barrel is nearly empty. What remains sloshes faintly inside.</p>':''}`,
    `<button class="btn-primary" onclick="mountDoom()">Climb to the Sammath Naur →</button>`
  ));
}

// ═══════════════════════════════════════════ MOUNT DOOM
function mountDoom(){
  G.location='Mount Doom';addMiles(160);advance(1);
  const s=getStarter();
  const brewName=s?.name||'The Brew';
  const cond=brewCondition();
  const survivors=G.companions.filter(x=>x.health>0).map(x=>x.name);
  const survText=survivors.length>0?survivors.join(', ')+' stand beside you.':'You stand alone.';
  R(frame('ORODRUIN — THE SAMMATH NAUR','Day '+G.day+' · The Crack of Doom',
    statusBar()+beerBar()+partyHealth()+
    '<p>The heat is unbearable. The path is narrow. You stand at the edge of the great fissure, the fires below, the barrel in your arms.</p>'
    +'<p>'+brewName+' — '+Math.round(G.beer)+'% remains. Condition: <strong style="color:'+cond.color+'">'+cond.label+'</strong>. '+cond.desc+'</p>'
    +'<p style="font-size:12px;color:var(--dim)">'+survText+'</p>'
    +'<p>One final choice.</p>'
    +choices([
      {label:'Pour the brew into the fire',
       note:'The traditional ending. Brew score = 0. Your journey and party are all that count toward your final score.',
       fn:"finalChoice('pour')"},
      {label:'Carry it home — you earned it',
       note:'Keep the full '+Math.round(G.beer)+'%. Brew condition feeds into your final score. The journey feels unfinished, but the barrel is yours.',
       fn:"finalChoice('keep')"},
      {label:'Share a final pour with your companions',
       note:'Drink '+Math.round(Math.min(G.beer,15))+'% between you. A shared ending. Small score bonus for generosity. '+survivors.length+' companions share it with you.',
       fn:"finalChoice('share')"},
    ])
  ));
}
function finalChoice(c){
  const s=getStarter();
  const brewName=s?.name||'The Brew';
  if(c==='pour'){
    G.beer=0;
    addNote('consumed by fire, leaving only the memory of what it was');
    addAch('sacrificed','The brew was returned to the fire of Orodruin');
    showEvent('INTO THE FIRE',brewName+' falls into the Crack of Doom. The fire takes it. For one moment the whole mountain smells of malt and hops. Then nothing.',false,'Brew destroyed. Score from journey only.',showEnding);
  } else if(c==='keep'){
    addNote('survived intact, a testament to every road taken');
    addAch('keeper','Carried the brew to the fires and brought it home');
    morale(10,'kept the brew');
    showEvent('THE LONG ROAD HOME','You turn your back on the fire. The barrel is still in your arms. You carried it here. You will carry it back. Whatever the world says.',true,'Full brew bonus applied to final score.',showEnding);
  } else {
    const amt=Math.min(G.beer,15);
    useBeer(amt,'final pour at the Crack of Doom');
    addNote('shared at the last, generous to the very end');
    addAch('shared','The final pour shared at the fires of Orodruin');
    morale(15,'final share');
    const survivors=G.companions.filter(x=>x.health>0).map(x=>x.name);
    const shareMsg=survivors.length>0?'You pass it to '+survivors.join(', ')+'. One pour each. Nobody speaks. The fire roars below.':'You drink alone at the edge of the world. It is still the best thing you have ever tasted.';
    showEvent('ONE LAST POUR',shareMsg,true,'-'+Math.round(amt)+'% brew shared. Morale +15.',showEnding);
  }
}

// ═══════════════════════════════════════════ ENDING + SCORE
function showEnding(){
  const s=getStarter();
  const brewName=s?.name||'The Brew';
  const styleName=s?.style||'ale';
  const r=ROLES[G.role];
  const survivorCount=G.companions.filter(c=>c.health>0).length;
  const playerAlive=G.health>0;
  const aliveNames=G.companions.filter(c=>c.health>0).map(c=>c.name).join(', ')||'none';
  const deadNames=G.companions.filter(c=>c.health<=0).map(c=>c.name).join(', ')||'none';

  // Achievements
  if(survivorCount===6)addAch('full_party','All six companions survived the journey');
  if(G.beer>=80)addAch('pristine','The brew arrived in pristine condition');
  if(G.health>0&&survivorCount===0)addAch('solo','Completed the journey alone');
  if(G.pathFlags.d6==='moria')addAch('moria','Survived the Mines of Moria');

  // Score
  const allHealth=[G.health,...G.companions.map(c=>Math.max(0,c.health))];
  const avgHealth=Math.round(allHealth.reduce((a,b)=>a+b,0)/allHealth.length);
  // Beer score: 0% brew = 0 points, 100% = 25 bonus points on top of base
  // Pouring it costs nothing (journey score only) but forfeits the bonus
  const brewScore=Math.round((G.beer/100)*25);
  const beerMult=0.5+(G.beer/100)*0.5;
  const base=Math.round(avgHealth*r.mult*beerMult);
  const survBonus=survivorCount*10+(playerAlive?15:0);
  const achBonus=G.achievements.length*8;
  // Time bonus: reward for finishing quickly (under 150 days = max bonus, over 220 = no bonus)
  const timeBonus=G.day<150?15:G.day<180?10:G.day<220?5:0;
  // Morale bonus
  const moraleBonus=Math.round(((G.morale||70)-50)/10)*2;
  const finalScore=Math.min(100,Math.max(0,base+brewScore+survBonus+achBonus+timeBonus+moraleBonus));

  let medal,grade,desc;
  if(finalScore>=90){medal='🥇';grade='Gold Medal';desc='A legendary journey. The brew is extraordinary. People will speak of this for an age of Middle Earth.';}
  else if(finalScore>=75){medal='🥈';grade='Silver Medal';desc='A remarkable journey. The brew is excellent. Not without its trials, but all the better for them.';}
  else if(finalScore>=55){medal='🥉';grade='Bronze Medal';desc='A solid effort. The brew is good. The road was hard and you saw it through.';}
  else if(finalScore>=35){medal='🍺';grade='Participation Pour';desc='You made it. The brew is drinkable. The road nearly broke you. But you are here.';}
  else{medal='🫗';grade='The Dregs';desc='The journey was brutal. What remains could generously be called vinegar. But you reached the fire.';}

  // Tasting note
  const s2=getStarter();
  const abvStr=s2?.abv?s2.abv+'% ABV':'Unknown ABV';
  const notes=G.tastingNotes.length>0?G.tastingNotes.slice(0,4).join(', '):'honest and direct, the product of a long and difficult road';
  const taphand=G.companions.find(c=>c.rk==='taproom_hand'&&c.health>0);
  const survLine=taphand?taphand.name+' — your Salesperson — would know exactly how to sell this.':survivorCount>0?'Those who survived the road would recognise it immediately.':'Nobody who saw this journey will forget this beer.';
  const cond2=brewCondition();
  const beerState=G.beer>=85?'Poured in pristine condition':G.beer>=65?'Served from a well-travelled barrel':G.beer>=40?'Rough handling shows in every pour':G.beer>=20?'What remains is concentrated and strange':'The last precious drops, barely a glass between you';
  const tastingNote=brewName+' — '+styleName+', '+abvStr+'.<br><br>'
    +beerState+', with '+notes+'. '
    +'The road from the Shire has left its mark on every sip. '
    +'Condition on arrival: <strong style="color:'+cond2.color+'">'+cond2.label+'</strong> — '+cond2.desc+'<br><br>'
    +survLine;

  R(frame('MOUNT DOOM — JOURNEY\'S END','Day '+G.day,
    `<div style="text-align:center;margin-bottom:18px">
      <div style="font-size:60px;margin-bottom:10px">${medal}</div>
      <h2>${grade}</h2>
      <p>${desc}</p>
    </div>
    <div class="tasting-note">
      <div style="font-family:var(--pixel);font-size:7px;color:var(--gold);margin-bottom:10px;font-style:normal">TASTING NOTE</div>
      ${tastingNote}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-family:var(--pixel);font-size:7px;color:var(--dim);margin-bottom:8px">THE BREW</div>
      ${(()=>{const s3=getStarter();const cond3=brewCondition();return '<p style="font-size:12px"><strong style="color:var(--gold)">'+(s3?.name||'The Brew')+'</strong> — '+(s3?.style||'ale')+', '+(s3?.abv||'4.5')+'% ABV</p><p style="font-size:12px">Arrived: <strong style="color:'+cond3.color+'">'+cond3.label+'</strong> ('+Math.round(G.beer)+'% remaining)</p>';})()}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-family:var(--pixel);font-size:7px;color:var(--dim);margin-bottom:8px">YOUR COMPANIONS</div>
      <p style="font-size:12px">Survived: <span style="color:#5aaa3a">${aliveNames}</span></p>
      <p style="font-size:12px">Lost on the road: <span style="color:#c04a2a">${deadNames}</span></p>
    </div>
    <div>
      <div style="font-family:var(--pixel);font-size:7px;color:var(--dim);margin-bottom:8px">FINAL SCORE</div>
      ${[
        ['Party health average',avgHealth+' / 100'],
        ['Brew condition ('+Math.round(G.beer)+'% · '+brewCondition().label+')','+'+brewScore],
        ['Role multiplier ('+r.label+')','×'+r.mult],
        ['Survivor bonus','+'+survBonus],
        ['Achievements ('+G.achievements.length+')'+' ×8','+'+achBonus],
        ['Speed bonus (day '+G.day+')','+'+timeBonus],
        ['Morale bonus',moraleBonus>=0?'+'+moraleBonus:''+moraleBonus],
        ...G.achievements.map(a=>['  ✓ '+a.label,'+8']),
        ['FINAL SCORE',finalScore+' / 100'],
      ].map(([l,v],i,arr)=>`<div class="score-row" style="${i===arr.length-1?'font-family:var(--pixel);font-size:9px;color:var(--gold);border-top:1px solid var(--border);padding-top:8px':''}"><span class="score-label">${l}</span><span class="score-val">${v}</span></div>`).join('')}
    </div>`,
    '<button class="btn-primary" onclick="goBrewAgain()">Brew again →</button>'
    +' <button class="btn-continue" onclick="goTaproom()">Back to taproom</button>'
  ));
}

window.goTaproom=function(){window.location.href='../index.html';};
showTitle();
