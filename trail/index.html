<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Brewery Trail</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="shell">

  <!-- LEFT NAV BAR -->
  <aside id="left-bar" class="nav-bar">
    <button class="nav-btn" onclick="Game.navMap()">
      <span class="nav-icon">🗺</span>
      <span class="nav-label">Map</span>
    </button>
    <button class="nav-btn" onclick="Game.navGuide()">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Guide</span>
    </button>
    <button class="nav-btn" onclick="Game.navStatus()">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Status</span>
    </button>
    <button class="nav-btn" onclick="Game.navRations()">
      <span class="nav-icon">🍖</span>
      <span class="nav-label">Rations</span>
    </button>
    <button class="nav-btn" onclick="Game.navBuy()">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Buy</span>
    </button>
  </aside>

  <!-- CENTER COLUMN -->
  <main id="center">
    <!-- Top: static scene (map or location art) -->
    <div id="scene-box">
      <canvas id="scene-canvas" width="460" height="140"></canvas>
      <div id="scene-label">The Shire</div>
    </div>

    <!-- Bottom: log OR decision panel -->
    <div id="content">
      <div id="log"></div>
      <div id="decision" class="hidden"></div>
    </div>
  </main>

  <!-- CONDITIONS COLUMN -->
  <aside id="conditions">
    <div class="cond-title">Conditions</div>
    <div class="cond-date" id="c-date">23 Sep 3018</div>

    <div class="cond-weather">
      <span class="weather-icon" id="c-wicon">☀</span>
      <span class="weather-label" id="c-wlabel">Clear</span>
    </div>

    <div class="cond-section">
      <div class="cond-head">Distance</div>
      <div class="cond-row"><span class="cl">To Landmark:</span><span class="cv" id="c-mnext">80 mi.</span></div>
      <div class="cond-row"><span class="cl">Traveled:</span><span class="cv" id="c-mtot">0 mi.</span></div>
    </div>

    <div class="cond-section">
      <div class="cond-head">Party</div>
      <div class="cond-row"><span class="cl">Pace:</span><span class="cv" id="c-pace">Steady</span></div>
      <div class="cond-row"><span class="cl">Rations:</span><span class="cv" id="c-rations">Filling</span></div>
      <div class="cond-row"><span class="cl">Food:</span><span class="cv" id="c-food">600 lbs</span></div>
      <div class="cond-row"><span class="cl">Health:</span><span class="cv" id="c-health">Good</span></div>
      <div class="cond-row"><span class="cl">Brew:</span><span class="cv" id="c-brew">100%</span></div>
      <div class="cond-row"><span class="cl">Status:</span><span class="cv" id="c-status">Stopped</span></div>
    </div>

    <div id="c-ill" class="cond-ill"></div>

    <div class="cond-btns">
      <button id="btn-continue" class="cond-btn primary" onclick="Game.pressContinue()">Continue</button>
      <button id="btn-timeout" class="cond-btn" onclick="Game.pressTimeOut()">Time Out</button>
    </div>
  </aside>

  <!-- RIGHT ACTION BAR -->
  <aside id="right-bar" class="nav-bar">
    <button class="nav-btn" onclick="Game.actTrade()">
      <span class="nav-icon">🤝</span>
      <span class="nav-label">Trade</span>
    </button>
    <button class="nav-btn" onclick="Game.actTalk()">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Talk</span>
    </button>
    <button class="nav-btn" onclick="Game.actRest()">
      <span class="nav-icon">💤</span>
      <span class="nav-label">Rest</span>
    </button>
    <button class="nav-btn" onclick="Game.actPace()">
      <span class="nav-icon">🐎</span>
      <span class="nav-label">Pace</span>
    </button>
    <button class="nav-btn" onclick="Game.actHunt()">
      <span class="nav-icon">🏹</span>
      <span class="nav-label">Hunt</span>
    </button>
  </aside>

</div>

<!-- Modal overlay -->
<div id="modal" class="hidden" onclick="Game.bgClose(event)">
  <div id="modal-box"></div>
</div>

<script src="js/state.js"></script>
<script src="js/engine.js"></script>
<script src="js/events.js"></script>
<script src="js/routes.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>

</body>
</html>
