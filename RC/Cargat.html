<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brewery RC - Raycast Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; touch-action: none; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #7fc; 
            background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">WASD: Drive | Space: Brake | R: Flip/Reset</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as CANNON from 'cannon-es';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);

        // Collision groups: chassis won't collide with wheel bodies
        const GROUP_CHASSIS = 1;
        const GROUP_WHEEL   = 2;
        const GROUP_WORLD   = 4;

		let currentSteer = 0;


        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- Assets & Materials ---
        const loader = new GLTFLoader();
        const textureLoader = new THREE.TextureLoader();
        const colormap = textureLoader.load('Textures/colormap.png');
        colormap.colorSpace = THREE.SRGBColorSpace;
        colormap.flipY = false;

        // --- The Environment (Hidden Floor) ---
        // Creating a large static box for the floor/brewery area
        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Box(new CANNON.Vec3(50, 0.1, 50)));
        floorBody.position.set(0, -0.1, 0);
        floorBody.collisionFilterGroup = GROUP_WORLD;
        floorBody.collisionFilterMask  = GROUP_CHASSIS | GROUP_WHEEL;
        world.addBody(floorBody);

        const floorMesh = new THREE.Mesh(
            new THREE.BoxGeometry(100, 0.2, 100),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        floorMesh.position.y = -0.1;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // --- Vehicle Setup ---
		// 1. Create the shape (the physical box)
		const chassisShape = new CANNON.Box(new CANNON.Vec3(0.3, 0.2, 0.6));

		// 2. Create the body (the mass/physics object)
		const chassisBody = new CANNON.Body({ mass: 150 });

		// 3. Add the shape with an OFFSET
		// We move the box UP by 0.2 meters. 
		// Since the 'Center of Mass' stays at 0, the weight is now at the bottom of the box.
		const centerOfMassOffset = new CANNON.Vec3(0, 0.2, 0); 
		chassisBody.addShape(chassisShape, centerOfMassOffset);

		// 4. Set the starting position
		chassisBody.position.set(0, 2, 0);
		chassisBody.angularDamping = 0.5;
        chassisBody.collisionFilterGroup = GROUP_CHASSIS;
        chassisBody.collisionFilterMask  = GROUP_WORLD;

        const vehicle = new CANNON.RaycastVehicle({
            chassisBody: chassisBody,
            indexForwardAxis: 2,
            indexRightAxis: 0,
            indexUpAxis: 1
        });

// 1. Your general settings (The template)
		const wheelOptions = {
			radius: 0.15,
			directionLocal: new CANNON.Vec3(0, -1, 0),
			axleLocal: new CANNON.Vec3(1, 0, 0),
			suspensionStiffness: 30,
			suspensionRestLength: 0.1,
			frictionSlip: 1.4,
			dampingRelaxation: 2.3,
			dampingCompression: 4.4,
			maxSuspensionForce: 100000,
			rollInfluence: 0.01,
			maxSuspensionTravel: 0.2,
			customSlidingRotationalSpeed: -30,
			useCustomSlidingRotationalSpeed: true
		};

		// 2. Define the 4 unique locations for the wheels
		// These are [Left/Right, Height, Front/Back]
		const wheelOffsets = [
			new CANNON.Vec3(0.2, 0, 0.15),  // Front Left
			new CANNON.Vec3(-0.2, 0, 0.15), // Front Right
			new CANNON.Vec3(0.2, 0, -0.15), // Back Left
			new CANNON.Vec3(-0.2, 0, -0.15) // Back Right
		];

		// --- 3. Add Wheels to Vehicle ---
		wheelOffsets.forEach((offset, index) => {
			const options = { 
				...wheelOptions, 
				chassisConnectionPointLocal: offset,
				// Wheels 2 and 3 get steering (index 2 or 3)
				isFrontWheel: (index === 2 || index === 3) 
			}; // <--- This closes the 'options' object

			vehicle.addWheel(options);
		}); // <--- This closes the 'forEach' loop

        vehicle.addToWorld(world);

        // Prevent wheel ray bodies from colliding with the chassis
        vehicle.wheelBodies.forEach(wb => {
            wb.collisionFilterGroup = GROUP_WHEEL;
            wb.collisionFilterMask  = GROUP_WORLD;
        });

		let carVisual;
		let carWheels = []; // This will hold our 4 GLB wheel meshes

		loader.load('vehicle-racer.glb', (glb) => {
					carVisual = glb.scene;
					let foundWheels = [];
					
					carVisual.traverse(child => {
						if (child.isMesh && child.name.toLowerCase().includes('wheel')) {
							// 1. Reset any previous messy rotations
							child.geometry.rotateX(0);
							child.geometry.rotateY(0);
							child.geometry.rotateZ(0);

							// 2. Stand them upright (Note the CAPITAL X)
							child.geometry.rotateX(Math.PI / 2); 
							
							foundWheels.push(child);
						}
					});

					// Sort: Index 0/2 = Left side | Index 1/3 = Right side
					foundWheels.sort((a, b) => a.position.x - b.position.x);
					carWheels = foundWheels;
					
					scene.add(carVisual);
				});

        // --- Input Handling ---
        const keys = { w: false, s: false, a: false, d: false, space: false };
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true;
            if(key === ' ') keys.space = true;
            if(key === 'r') resetVehicle();
        });
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false;
            if(key === ' ') keys.space = false;
        });

        function resetVehicle() {
            chassisBody.position.set(0, 2, 0);
            chassisBody.quaternion.set(0, 0, 0, 1);
            chassisBody.velocity.set(0,0,0);
            chassisBody.angularVelocity.set(0,0,0);
        }

// --- Animation Loop ---
function update() {
    world.step(1/60);

    // 1. Core Settings
    const engineForce = 200;  // Slightly buffed for the brewery floor
    const maxSteer = 0.3;
    const brakeForce = 20;
    const lerpSpeed = 0.1; 

    // 2. Smooth Steering — lerp toward target, never snaps
    const steerTarget = keys.a ? -maxSteer : keys.d ? maxSteer : 0;
    currentSteer += (steerTarget - currentSteer) * lerpSpeed;
    if (Math.abs(currentSteer) < 0.001) currentSteer = 0;
    // Clamp just in case
    currentSteer = Math.max(-maxSteer, Math.min(maxSteer, currentSteer));

    // 3. Driving & Braking
    const force = keys.w ? engineForce : (keys.s ? -engineForce : 0);
    const currentBrake = keys.space ? brakeForce : 0;

    // 4. Apply Physics (0,1 = Front | 2,3 = Back)
    // Adjusting these to the most common Raycast layout:
    vehicle.setSteeringValue(currentSteer, 0);
    vehicle.setSteeringValue(currentSteer, 1);
    
    vehicle.applyEngineForce(force, 2);
    vehicle.applyEngineForce(force, 3);

    for (let i = 0; i < 4; i++) {
        vehicle.setBrake(currentBrake, i);
    }

		// --- 5. Visual Sync ---
		if (carVisual) {
			carVisual.position.copy(chassisBody.position);
			carVisual.quaternion.copy(chassisBody.quaternion);

			// Inside your update() function...
			for (let i = 0; i < vehicle.wheelInfos.length; i++) {
				vehicle.updateWheelTransform(i);
				const t = vehicle.wheelInfos[i].worldTransform;

				if (carWheels[i]) {
					carWheels[i].position.copy(t.position);
					carWheels[i].quaternion.copy(t.quaternion);

					// --- THE 180° FLIPS ---
					// 1. Flip Right-side wheels (rims facing out)
					if (i === 1 || i === 3) {
						const sideFlip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
						carWheels[i].quaternion.multiply(sideFlip);
					}

					// 2. Flip Back wheels (if they are still backward)
					// If your back wheels (index 2/3) are still wrong, uncomment this:
					/*
					if (i === 2 || i === 3) {
						const backFlip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
						carWheels[i].quaternion.multiply(backFlip);
					}
					*/

					carVisual.worldToLocal(carWheels[i].position);
				}
			}
		}

    // 6. Camera Logic
    const chassisPos = new THREE.Vector3().copy(chassisBody.position);
    const cameraOffset = new THREE.Vector3(0, 2, 5); 
    if (carVisual) {
        cameraOffset.applyQuaternion(carVisual.quaternion);
    }
    camera.position.lerp(chassisPos.clone().add(cameraOffset), 0.1);
    camera.lookAt(chassisPos);

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
