<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brewery RC - Raycast Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; touch-action: none; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #7fc; 
            background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none;
        }
        #car-switcher {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.6); padding: 10px 16px; border-radius: 8px;
        }
        #car-name {
            color: #7fc; font-size: 14px; min-width: 160px; text-align: center; letter-spacing: 1px;
        }
        #car-switcher button {
            background: rgba(127,255,200,0.15); border: 1px solid #7fc; color: #7fc;
            font-family: monospace; font-size: 16px; padding: 4px 12px;
            cursor: pointer; border-radius: 4px;
        }
        #car-switcher button:hover { background: rgba(127,255,200,0.3); }
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #7fc; font-size: 18px; display: none;
        }
    </style>
</head>
<body>
    <div id="instructions">WASD: Drive | Space: Brake | R: Reset | C: Next Car</div>
    <div id="car-switcher">
        <button id="btn-prev">◀</button>
        <div id="car-name">RACER</div>
        <button id="btn-next">▶</button>
    </div>
    <div id="loading">Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as CANNON from 'cannon-es';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);

        // Collision groups: chassis won't collide with wheel bodies
        const GROUP_CHASSIS = 1;
        const GROUP_WORLD   = 4;

		let currentSteer = 0;


        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- Assets & Materials ---
        const loader = new GLTFLoader();
        const textureLoader = new THREE.TextureLoader();
        const colormap = textureLoader.load('Textures/colormap.png');
        colormap.colorSpace = THREE.SRGBColorSpace;
        colormap.flipY = false;

        // --- The Environment (Hidden Floor) ---
        // Creating a large static box for the floor/brewery area
        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Box(new CANNON.Vec3(50, 0.1, 50)));
        floorBody.position.set(0, -0.1, 0);
        floorBody.collisionFilterGroup = GROUP_WORLD;
        floorBody.collisionFilterMask  = GROUP_CHASSIS;
        world.addBody(floorBody);

        const floorMesh = new THREE.Mesh(
            new THREE.BoxGeometry(100, 0.2, 100),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        floorMesh.position.y = -0.1;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // ============================================================
        // CAR PROFILES — tune each vehicle independently
        // ============================================================
        const CAR_PROFILES = [
            {
                name: 'RACER',
                file: 'vehicle-racer.glb',
                mass: 300,
                engineForce: 50,
                brakeForce: 20,
                maxSteer: 0.3,
                suspension: { stiffness: 55, restLength: 0.08, travel: 0.2, damping: 2.3, compression: 4.4 },
                wheelRadius: 0.15,
                frictionSlip: 0.8,
            },
            {
                name: 'RACER LOW',
                file: 'vehicle-racer-low.glb',
                mass: 280,
                engineForce: 60,
                brakeForce: 25,
                maxSteer: 0.28,
                suspension: { stiffness: 60, restLength: 0.06, travel: 0.15, damping: 2.0, compression: 4.0 },
                wheelRadius: 0.14,
                frictionSlip: 0.9,
            },
            {
                name: 'DRAG RACER',
                file: 'vehicle-drag-racer.glb',
                mass: 320,
                engineForce: 90,
                brakeForce: 30,
                maxSteer: 0.2,
                suspension: { stiffness: 70, restLength: 0.07, travel: 0.15, damping: 2.5, compression: 5.0 },
                wheelRadius: 0.16,
                frictionSlip: 1.0,
            },
            {
                name: 'MONSTER TRUCK',
                file: 'vehicle-monster-truck.glb',
                mass: 600,
                engineForce: 120,
                brakeForce: 40,
                maxSteer: 0.35,
                suspension: { stiffness: 35, restLength: 0.3, travel: 0.5, damping: 1.8, compression: 3.5 },
                wheelRadius: 0.28,
                frictionSlip: 0.7,
            },
            {
                name: 'SPEEDSTER',
                file: 'vehicle-speedster.glb',
                mass: 250,
                engineForce: 70,
                brakeForce: 22,
                maxSteer: 0.32,
                suspension: { stiffness: 65, restLength: 0.07, travel: 0.18, damping: 2.2, compression: 4.2 },
                wheelRadius: 0.14,
                frictionSlip: 0.85,
            },
            {
                name: 'SUV',
                file: 'vehicle-suv.glb',
                mass: 500,
                engineForce: 80,
                brakeForce: 35,
                maxSteer: 0.3,
                suspension: { stiffness: 45, restLength: 0.2, travel: 0.35, damping: 2.0, compression: 4.0 },
                wheelRadius: 0.2,
                frictionSlip: 0.75,
            },
            {
                name: 'TRUCK',
                file: 'vehicle-truck.glb',
                mass: 700,
                engineForce: 100,
                brakeForce: 45,
                maxSteer: 0.25,
                suspension: { stiffness: 40, restLength: 0.22, travel: 0.4, damping: 2.1, compression: 4.1 },
                wheelRadius: 0.22,
                frictionSlip: 0.7,
            },
            {
                name: 'VINTAGE',
                file: 'vehicle-vintage-racer.glb',
                mass: 350,
                engineForce: 45,
                brakeForce: 15,
                maxSteer: 0.35,
                suspension: { stiffness: 30, restLength: 0.12, travel: 0.25, damping: 1.5, compression: 3.0 },
                wheelRadius: 0.15,
                frictionSlip: 0.65,
            },
        ];

        let currentCarIndex = 0;
        let activProfile = CAR_PROFILES[0];

        // --- Vehicle Setup ---
        const chassisShape = new CANNON.Box(new CANNON.Vec3(0.3, 0.2, 0.6));
        const chassisBody = new CANNON.Body({ mass: activProfile.mass });
        const centerOfMassOffset = new CANNON.Vec3(0, 0.2, 0);
        chassisBody.addShape(chassisShape, centerOfMassOffset);
        chassisBody.position.set(0, 2, 0);
        chassisBody.angularDamping = 0.5;
        chassisBody.collisionFilterGroup = GROUP_CHASSIS;
        chassisBody.collisionFilterMask  = GROUP_WORLD;

        const vehicle = new CANNON.RaycastVehicle({
            chassisBody,
            indexForwardAxis: 2,
            indexRightAxis: 0,
            indexUpAxis: 1
        });

        // Wheels are built dynamically from GLB positions in loadCar()
        vehicle.addToWorld(world);

        // --- Visual state ---
        let carVisual = null;
        let carWheels = [];

        function clearVisual() {
            if (carVisual) { scene.remove(carVisual); carVisual = null; }
            carWheels.forEach(w => scene.remove(w));
            carWheels = [];
        }

        function loadCar(profile) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('car-name').textContent = profile.name;
            clearVisual();

            // Update physics mass
            chassisBody.mass = profile.mass;
            chassisBody.updateMassProperties();

            loader.load(profile.file, (glb) => {
                carVisual = glb.scene;
                const foundWheels = [];

                carVisual.traverse(child => {
                    if (child.isMesh && child.name.toLowerCase().includes('wheel')) {
                        child.geometry.rotateX(Math.PI / 2);
                        foundWheels.push(child);
                    }
                });

                foundWheels.sort((a, b) => b.position.x - a.position.x);

                // Build wheel physics using the ACTUAL positions from the GLB
                // This way the physics wheels always match the visual model exactly
                while (vehicle.wheelInfos.length) vehicle.wheelInfos.pop();

                foundWheels.forEach((w, index) => {
                    const pos = w.position; // local position within the GLB
                    vehicle.addWheel({
                        radius: profile.wheelRadius,
                        directionLocal: new CANNON.Vec3(0, -1, 0),
                        axleLocal: new CANNON.Vec3(1, 0, 0),
                        suspensionStiffness: profile.suspension.stiffness,
                        suspensionRestLength: profile.suspension.restLength,
                        frictionSlip: profile.frictionSlip,
                        dampingRelaxation: profile.suspension.damping,
                        dampingCompression: profile.suspension.compression,
                        maxSuspensionForce: 100000,
                        rollInfluence: 0.01,
                        maxSuspensionTravel: profile.suspension.travel,
                        customSlidingRotationalSpeed: -30,
                        useCustomSlidingRotationalSpeed: true,
                        chassisConnectionPointLocal: new CANNON.Vec3(pos.x, pos.y, pos.z),
                        isFrontWheel: index < 2
                    });
                });

                foundWheels.forEach(w => { carVisual.remove(w); scene.add(w); });
                carWheels = foundWheels;
                scene.add(carVisual);

                resetVehicle();
                document.getElementById('loading').style.display = 'none';
            });
        }

        // Load the first car
        loadCar(activProfile);

        // --- Car cycling ---
        function cyclecar(dir) {
            currentCarIndex = (currentCarIndex + dir + CAR_PROFILES.length) % CAR_PROFILES.length;
            activProfile = CAR_PROFILES[currentCarIndex];
            loadCar(activProfile);
        }

        document.getElementById('btn-next').addEventListener('click', () => cyclecar(1));
        document.getElementById('btn-prev').addEventListener('click', () => cyclecar(-1));

        // --- Input Handling ---
        const keys = { w: false, s: false, a: false, d: false, space: false };
        window.addEventListener('keydown', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true;
            if(key === ' ') keys.space = true;
            if(key === 'r') resetVehicle();
            if(key === 'c') cyclecar(1);
        });
        window.addEventListener('keyup', (e) => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false;
            if(key === ' ') keys.space = false;
        });

        function resetVehicle() {
            chassisBody.position.set(0, 2, 0);
            chassisBody.quaternion.set(0, 0, 0, 1);
            chassisBody.velocity.set(0,0,0);
            chassisBody.angularVelocity.set(0,0,0);
        }

// --- Animation Loop ---
function update() {
    world.step(1/60);

    // Read live from active car profile
    const engineForce = activProfile.engineForce;
    const maxSteer    = activProfile.maxSteer;
    const brakeForce  = activProfile.brakeForce;
    const lerpSpeed   = 0.1;

    // 2. Smooth Steering — lerp toward target, never snaps
    const steerTarget = keys.a ? maxSteer : keys.d ? -maxSteer : 0;
    currentSteer += (steerTarget - currentSteer) * lerpSpeed;
    if (Math.abs(currentSteer) < 0.001) currentSteer = 0;
    // Clamp just in case
    currentSteer = Math.max(-maxSteer, Math.min(maxSteer, currentSteer));

    // 3. Driving & Braking
    const force = keys.w ? engineForce : (keys.s ? -engineForce : 0);
    const currentBrake = keys.space ? brakeForce : 0;

    // 4. Apply Physics — steer on 2&3 (front in this GLB's layout), drive on 0&1
    vehicle.setSteeringValue(currentSteer, 2);
    vehicle.setSteeringValue(currentSteer, 3);
    vehicle.setSteeringValue(0, 0);
    vehicle.setSteeringValue(0, 1);

    vehicle.applyEngineForce(force, 0);
    vehicle.applyEngineForce(force, 1);
    vehicle.applyEngineForce(0, 2);
    vehicle.applyEngineForce(0, 3);

    for (let i = 0; i < 4; i++) {
        vehicle.setBrake(currentBrake, i);
    }

		// --- 5. Visual Sync ---
		if (carVisual) {
			carVisual.position.copy(chassisBody.position);
			carVisual.quaternion.copy(chassisBody.quaternion);

			for (let i = 0; i < vehicle.wheelInfos.length; i++) {
				vehicle.updateWheelTransform(i);
				const t = vehicle.wheelInfos[i].worldTransform;

				if (carWheels[i]) {
					// Wheels are scene-level objects — set world transforms directly
					carWheels[i].position.copy(t.position);
					carWheels[i].quaternion.copy(t.quaternion);

					// Each wheel flipped individually to face outward
					const yFlip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
					const zFlip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), Math.PI);

					if (i === 0) { /* Front Left  — no flip needed */ }
					if (i === 1) { carWheels[i].quaternion.multiply(zFlip); } // Front Right
					if (i === 2) { carWheels[i].quaternion.multiply(yFlip); } // Back Left
					if (i === 3) { /* Back Right — no flip needed */ }
				}
			}
		}

    // 6. Camera Logic
    const chassisPos = new THREE.Vector3().copy(chassisBody.position);
    const cameraOffset = new THREE.Vector3(0, 2, 5); 
    if (carVisual) {
        cameraOffset.applyQuaternion(carVisual.quaternion);
    }
    camera.position.lerp(chassisPos.clone().add(cameraOffset), 0.1);
    camera.lookAt(chassisPos);

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
