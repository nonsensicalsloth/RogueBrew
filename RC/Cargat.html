<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brewery RC - Raycast Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; touch-action: none; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #7fc;
            background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none;
        }
        #car-switcher {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.6); padding: 10px 16px; border-radius: 8px;
        }
        #car-name { color: #7fc; font-size: 14px; min-width: 160px; text-align: center; letter-spacing: 1px; }
        #car-switcher button {
            background: rgba(127,255,200,0.15); border: 1px solid #7fc; color: #7fc;
            font-family: monospace; font-size: 16px; padding: 4px 12px;
            cursor: pointer; border-radius: 4px;
        }
        #car-switcher button:hover { background: rgba(127,255,200,0.3); }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #7fc; font-size: 18px; display: none;
        }
    </style>
</head>
<body>
    <div id="instructions">WASD: Drive | Space: Brake | R: Reset | C: Next Car</div>
    <div id="car-switcher">
        <button id="btn-prev">◀</button>
        <div id="car-name">RACER</div>
        <button id="btn-next">▶</button>
    </div>
    <div id="loading">Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as CANNON from 'cannon-es';

        // ================================================================
        // RENDERER & SCENE
        // ================================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ================================================================
        // LIGHTING
        // ================================================================
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // ================================================================
        // PHYSICS WORLD
        // ================================================================
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);

        const GROUP_CHASSIS = 1;
        const GROUP_WORLD   = 4;

        // ================================================================
        // FLOOR
        // ================================================================
        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Box(new CANNON.Vec3(50, 0.1, 50)));
        floorBody.position.set(0, -0.1, 0);
        floorBody.collisionFilterGroup = GROUP_WORLD;
        floorBody.collisionFilterMask  = GROUP_CHASSIS;
        world.addBody(floorBody);

        const floorMesh = new THREE.Mesh(
            new THREE.BoxGeometry(100, 0.2, 100),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        floorMesh.position.y = -0.1;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // ================================================================
        // TEXTURE
        // ================================================================
        const textureLoader = new THREE.TextureLoader();
        const colormap = textureLoader.load('Textures/colormap.png');
        colormap.colorSpace = THREE.SRGBColorSpace;
        colormap.flipY = false;

        // ================================================================
        // CAR PROFILES
        //
        // Wheel node names in each vehicle GLB (confirmed by inspection):
        //   wheel-fl = front-left  (negative X, negative Z)
        //   wheel-fr = front-right (positive X, negative Z)
        //   wheel-bl = back-left   (negative X, positive Z)
        //   wheel-br = back-right  (positive X, positive Z)
        //
        // Physics wheel index order used throughout: FL=0, FR=1, BL=2, BR=3
        //   Steering: indices 0 & 1 (front)
        //   Engine:   indices 2 & 3 (rear)
        //
        // Wheel mesh orientation fix (baked into geometry at load time):
        //   All wheels: rotateX(PI/2) — GLB wheels are flat, need to stand upright
        //   Right-side wheels (FR=1, BR=3): rotateY(PI) — tread faces outward
        // ================================================================
        const CAR_PROFILES = [
            {
                name: 'RACER',
                file: 'vehicle-racer.glb',
                wheelFile: 'wheel-small.glb',
                mass: 300, engineForce: 50, brakeForce: 20, maxSteer: 0.3,
                suspension: { stiffness: 55, restLength: 0.08, travel: 0.2, damping: 2.3, compression: 4.4 },
                wheelRadius: 0.125, frictionSlip: 0.8,
            },
            {
                name: 'RACER LOW',
                file: 'vehicle-racer-low.glb',
                wheelFile: 'wheel-small.glb',
                mass: 280, engineForce: 60, brakeForce: 25, maxSteer: 0.28,
                suspension: { stiffness: 60, restLength: 0.06, travel: 0.15, damping: 2.0, compression: 4.0 },
                wheelRadius: 0.125, frictionSlip: 0.9,
            },
            {
                name: 'DRAG RACER',
                file: 'vehicle-drag-racer.glb',
                wheelFile: 'wheel-medium.glb',
                mass: 320, engineForce: 90, brakeForce: 30, maxSteer: 0.2,
                suspension: { stiffness: 70, restLength: 0.07, travel: 0.15, damping: 2.5, compression: 5.0 },
                wheelRadius: 0.15, frictionSlip: 1.0,
            },
            {
                name: 'MONSTER TRUCK',
                file: 'vehicle-monster-truck.glb',
                wheelFile: 'wheel-large.glb',
                mass: 600, engineForce: 120, brakeForce: 40, maxSteer: 0.35,
                suspension: { stiffness: 35, restLength: 0.1, travel: 0.5, damping: 1.8, compression: 3.5 },
                wheelRadius: 0.3, frictionSlip: 0.7,
            },
            {
                name: 'SPEEDSTER',
                file: 'vehicle-speedster.glb',
                wheelFile: 'wheel-small.glb',
                mass: 250, engineForce: 70, brakeForce: 22, maxSteer: 0.32,
                suspension: { stiffness: 65, restLength: 0.07, travel: 0.18, damping: 2.2, compression: 4.2 },
                wheelRadius: 0.125, frictionSlip: 0.85,
            },
            {
                name: 'SUV',
                file: 'vehicle-suv.glb',
                wheelFile: 'wheel-medium.glb',
                mass: 500, engineForce: 80, brakeForce: 35, maxSteer: 0.3,
                suspension: { stiffness: 45, restLength: 0.2, travel: 0.35, damping: 2.0, compression: 4.0 },
                wheelRadius: 0.175, frictionSlip: 0.75,
            },
            {
                name: 'TRUCK',
                file: 'vehicle-truck.glb',
                wheelFile: 'wheel-medium.glb',
                mass: 700, engineForce: 100, brakeForce: 45, maxSteer: 0.25,
                suspension: { stiffness: 40, restLength: 0.22, travel: 0.4, damping: 2.1, compression: 4.1 },
                wheelRadius: 0.175, frictionSlip: 0.7,
            },
            {
                name: 'VINTAGE',
                file: 'vehicle-vintage-racer.glb',
                wheelFile: 'wheel-small.glb',
                mass: 350, engineForce: 45, brakeForce: 15, maxSteer: 0.35,
                suspension: { stiffness: 30, restLength: 0.12, travel: 0.25, damping: 1.5, compression: 3.0 },
                wheelRadius: 0.125, frictionSlip: 0.65,
            },
        ];

        // ================================================================
        // CHASSIS PHYSICS (shared body, mass updated per car)
        // ================================================================
        const chassisBody = new CANNON.Body({ mass: CAR_PROFILES[0].mass });
        chassisBody.addShape(
            new CANNON.Box(new CANNON.Vec3(0.3, 0.2, 0.6)),
            new CANNON.Vec3(0, 0.2, 0)  // offset shape upward so centre of mass sits low
        );
        chassisBody.position.set(0, 2, 0);
        chassisBody.angularDamping = 0.5;
        chassisBody.collisionFilterGroup = GROUP_CHASSIS;
        chassisBody.collisionFilterMask  = GROUP_WORLD;

        const vehicle = new CANNON.RaycastVehicle({
            chassisBody,
            indexForwardAxis: 2,
            indexRightAxis: 0,
            indexUpAxis: 1,
        });
        vehicle.addToWorld(world);

        // ================================================================
        // VISUAL STATE
        // ================================================================
        const loader = new GLTFLoader();
        let carVisual = null;   // car body — scene-level object
        let carWheels = [];     // [FL, FR, BL, BR] — scene-level objects

        function clearVisual() {
            if (carVisual) { scene.remove(carVisual); carVisual = null; }
            carWheels.forEach(w => { if (w) scene.remove(w); });
            carWheels = [];
        }

        // ================================================================
        // LOAD CAR
        // ================================================================
        function loadCar(profile) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('car-name').textContent = profile.name;
            clearVisual();

            chassisBody.mass = profile.mass;
            chassisBody.updateMassProperties();

            Promise.all([
                new Promise(res => loader.load(profile.file, res)),
                new Promise(res => loader.load(profile.wheelFile, res)),
            ]).then(([carGlb, wheelGlb]) => {

                carVisual = carGlb.scene;

                // Find each wheel slot by exact node name
                const slots = { fl: null, fr: null, bl: null, br: null };
                carVisual.traverse(child => {
                    switch (child.name.toLowerCase()) {
                        case 'wheel-fl': slots.fl = child; break;
                        case 'wheel-fr': slots.fr = child; break;
                        case 'wheel-bl': slots.bl = child; break;
                        case 'wheel-br': slots.br = child; break;
                    }
                });

                // FL=0, FR=1, BL=2, BR=3 — order must match physics indices below
                const slotOrder = [slots.fl, slots.fr, slots.bl, slots.br];

                // Rebuild physics wheels using exact positions from GLB nodes
                while (vehicle.wheelInfos.length) vehicle.wheelInfos.pop();
                slotOrder.forEach((slot, i) => {
                    if (!slot) { console.warn(`wheel slot missing at index ${i}`); return; }
                    const p = slot.position;
                    vehicle.addWheel({
                        radius:                          profile.wheelRadius,
                        directionLocal:                  new CANNON.Vec3(0, -1, 0),
                        axleLocal:                       new CANNON.Vec3(1, 0, 0),
                        chassisConnectionPointLocal:     new CANNON.Vec3(p.x, p.y, p.z),
                        isFrontWheel:                    i < 2,
                        suspensionStiffness:             profile.suspension.stiffness,
                        suspensionRestLength:            profile.suspension.restLength,
                        maxSuspensionTravel:             profile.suspension.travel,
                        dampingRelaxation:               profile.suspension.damping,
                        dampingCompression:              profile.suspension.compression,
                        frictionSlip:                    profile.frictionSlip,
                        maxSuspensionForce:              100000,
                        rollInfluence:                   0.01,
                        customSlidingRotationalSpeed:    -30,
                        useCustomSlidingRotationalSpeed: true,
                    });
                });

                // Get wheel mesh template from external wheel GLB
                let wheelTemplate = null;
                wheelGlb.scene.traverse(child => { if (child.isMesh) wheelTemplate = child; });

                // Clone wheel mesh for each corner, bake orientation into geometry once
                carWheels = slotOrder.map((slot, i) => {
                    if (!slot || !wheelTemplate) return null;
                    const mesh = wheelTemplate.clone();
                    mesh.geometry = wheelTemplate.geometry.clone();
                    mesh.geometry.rotateX(Math.PI / 2);              // stand upright
                    if (i === 1 || i === 3) mesh.geometry.rotateY(Math.PI); // right side: tread outward
                    if (slot.parent) slot.parent.remove(slot);        // remove placeholder from car
                    scene.add(mesh);
                    return mesh;
                });

                scene.add(carVisual);
                resetVehicle();
                document.getElementById('loading').style.display = 'none';
            });
        }

        // ================================================================
        // CAR CYCLING
        // ================================================================
        let currentCarIndex = 0;
        let activProfile = CAR_PROFILES[0];

        function cycleCar(dir) {
            currentCarIndex = (currentCarIndex + dir + CAR_PROFILES.length) % CAR_PROFILES.length;
            activProfile = CAR_PROFILES[currentCarIndex];
            loadCar(activProfile);
        }

        document.getElementById('btn-prev').addEventListener('click', () => cycleCar(-1));
        document.getElementById('btn-next').addEventListener('click', () => cycleCar(1));

        // ================================================================
        // INPUT
        // ================================================================
        const keys = { w: false, s: false, a: false, d: false, space: false };

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k in keys)  keys[k] = true;
            if (k === ' ')  keys.space = true;
            if (k === 'r')  resetVehicle();
            if (k === 'c')  cycleCar(1);
        });
        window.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k in keys)  keys[k] = false;
            if (k === ' ')  keys.space = false;
        });

        function resetVehicle() {
            chassisBody.position.set(0, 2, 0);
            chassisBody.quaternion.set(0, 0, 0, 1);
            chassisBody.velocity.set(0, 0, 0);
            chassisBody.angularVelocity.set(0, 0, 0);
        }

        // ================================================================
        // ANIMATION LOOP
        // ================================================================
        let currentSteer = 0;

        function update() {
            requestAnimationFrame(update);
            world.step(1 / 60);

            const { engineForce, brakeForce, maxSteer } = activProfile;

            // Smooth steering
            const steerTarget = keys.a ? maxSteer : keys.d ? -maxSteer : 0;
            currentSteer += (steerTarget - currentSteer) * 0.1;
            if (Math.abs(currentSteer) < 0.001) currentSteer = 0;

            // Skip physics forces until wheels are loaded from GLB
            if (vehicle.wheelInfos.length === 0) {
                renderer.render(scene, camera);
                return;
            }

            const force = keys.w ? engineForce : keys.s ? -engineForce : 0;
            const brake = keys.space ? brakeForce : 0;

            // Front wheels steer (FL=0, FR=1)
            vehicle.setSteeringValue(currentSteer, 0);
            vehicle.setSteeringValue(currentSteer, 1);

            // Rear wheels drive (BL=2, BR=3)
            vehicle.applyEngineForce(force, 2);
            vehicle.applyEngineForce(force, 3);
            vehicle.applyEngineForce(0, 0);
            vehicle.applyEngineForce(0, 1);

            for (let i = 0; i < 4; i++) vehicle.setBrake(brake, i);

            // Sync car body visual to physics
            if (carVisual) {
                carVisual.position.copy(chassisBody.position);
                carVisual.quaternion.copy(chassisBody.quaternion);
            }

            // Sync wheel visuals to physics transforms
            // Wheels are scene-level (not children of carVisual) so world transform applies directly
            for (let i = 0; i < vehicle.wheelInfos.length; i++) {
                vehicle.updateWheelTransform(i);
                const t = vehicle.wheelInfos[i].worldTransform;
                if (carWheels[i]) {
                    carWheels[i].position.copy(t.position);
                    carWheels[i].quaternion.copy(t.quaternion);
                }
            }

            // Chase camera
            const chassisPos = new THREE.Vector3().copy(chassisBody.position);
            const offset = new THREE.Vector3(0, 2, 5);
            if (carVisual) offset.applyQuaternion(carVisual.quaternion);
            camera.position.lerp(chassisPos.clone().add(offset), 0.1);
            camera.lookAt(chassisPos);

            renderer.render(scene, camera);
        }

        // ================================================================
        // INIT
        // ================================================================
        loadCar(activProfile);
        update();

    </script>
</body>
</html>
