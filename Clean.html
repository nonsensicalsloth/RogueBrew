<script type="module">

    { x: -3, z:  0, r:2.5, h:5.5, type:'fv', label:'FV10' },

    { x: -3, z: 44, r:2.5,  h:5.5,  type:'fv',  label:'FV14' },
    { x: -3, z: 52, r:3.25, h:10.0, type:'fv',  label:'FV15' },

    { x: 15, z: 36, r:3.5,  h:2.5, type:'bbt', label:'BBT6' },

    // Large tanks left section
    { x:-10, z: 28, r:3.25, h:10.0, type:'fv',  label:'FV17' },
    { x:-10, z: 36, r:3.25, h:10.0, type:'fv',  label:'FV18' },
    { x:-10, z: 44, r:2.5,  h: 5.5, type:'fv',  label:'FV19' },

];

// ─────────────────────────────────────────────────────────────
//  SCENE SETUP  (identical to OG)
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 30, 120);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
camera.rotation.order = 'YXZ';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// Physics — using the real Three.js Octree/Capsule addons (same as OG)
const worldOctree = new Octree();
const playerCapsule = new Capsule(
    new THREE.Vector3(0, 0.35, 15),
    new THREE.Vector3(0, 1.65, 15),
    0.35
);
const playerVelocity = new THREE.Vector3();
let playerOnFloor = false;

// ─────────────────────────────────────────────────────────────
//  MATERIALS
// ─────────────────────────────────────────────────────────────
const ssMat    = new THREE.MeshStandardMaterial({ color:0xd8d8dc, metalness:0.85, roughness:0.2 });
const ssDkMat  = new THREE.MeshStandardMaterial({ color:0xa8a8b4, metalness:0.75, roughness:0.35 });
const coneMat  = new THREE.MeshStandardMaterial({ color:0xc0c0c8, metalness:0.8,  roughness:0.25 });
const dirtyMat = new THREE.MeshStandardMaterial({ color:0x5a4a32, roughness:0.9,  metalness:0.0  });
const floorMat = new THREE.MeshStandardMaterial({ color:0x282828, roughness:0.85 });

// ─────────────────────────────────────────────────────────────
//  DIRT / CLEAN TRACKING
// ─────────────────────────────────────────────────────────────
const dirtPatches = [];   // { mesh, cleaned }
let cleanedCount = 0;

function makeDirt(x, y, z, r) {
    const geo  = new THREE.CircleGeometry(r, 8);
    const mat  = dirtyMat.clone();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(x, y + 0.005, z);
    scene.add(mesh);   // dirt is on the scene (not in octree)
    dirtPatches.push({ mesh, cleaned: false });
}

// Vertical dirt splat on the side of a tank cylinder
// nx,nz = outward normal direction (which side of the tank)
function makeDirtSide(x, y, z, nx, nz, r) {
    const geo  = new THREE.CircleGeometry(r, 8);
    const mat  = dirtyMat.clone();
    const mesh = new THREE.Mesh(geo, mat);
    // Orient circle to face outward from the tank surface
    mesh.lookAt(mesh.position.clone().add(new THREE.Vector3(nx, 0, nz)));
    // Offset slightly off the surface so it doesn't z-fight
    mesh.position.set(x + nx * 0.05, y, z + nz * 0.05);
    scene.add(mesh);
    dirtPatches.push({ mesh, cleaned: false });
}

function updateHUD() {
    const pct = dirtPatches.length ? Math.round(cleanedCount / dirtPatches.length * 100) : 0;
    document.getElementById('clean-bar').style.width = pct + '%';
    document.getElementById('clean-pct').textContent  = pct + '%';
    if (pct === 100 && dirtPatches.length > 0)
        document.getElementById('win-msg').style.display = 'block';
}

// ─────────────────────────────────────────────────────────────
//  FERMENTER BUILDER
//  Origin y=0 = floor level.
//  Geometry from bottom to top:
//    y=0              → cone tip (bottom of cone)
//    y=CONE_H         → cone base = bottom of cylinder
//    y=CONE_H+BODY_H  → top of cylinder
//  4 legs span from y=0 up to y=CONE_H (they support the cone base)
// ─────────────────────────────────────────────────────────────
function buildTank(cfg, worldGroup) {
    const { x, z, r, h, type } = cfg;
    const g = new THREE.Group();

    const CONE_H  = type === 'fv' ? h * 0.40 : 0;
    const BODY_H  = h;
    const BODY_BOT = CONE_H;   // cylinder starts right at cone base (y=CONE_H)

    // ── 4 legs at 90° intervals, spanning y=0 → y=CONE_H ──
    // Legs are positioned at 45° offset so they sit at corners, not sides
    const LEG_SPREAD = r * 0.68;
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
        const lx = Math.cos(angle) * LEG_SPREAD;
        const lz = Math.sin(angle) * LEG_SPREAD;

        // Main leg tube
        const leg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.09, 0.09, CONE_H, 8),
            ssDkMat
        );
        leg.position.set(lx, CONE_H / 2, lz);
        g.add(leg);

        // Foot pad at y=0
        const foot = new THREE.Mesh(
            new THREE.CylinderGeometry(0.14, 0.16, 0.07, 8),
            ssDkMat
        );
        foot.position.set(lx, 0.035, lz);
        g.add(foot);

        // Gusset brace near top of leg
        const gusset = new THREE.Mesh(
            new THREE.BoxGeometry(0.07, CONE_H * 0.35, 0.07),
            ssDkMat
        );
        gusset.position.set(lx * 0.6, CONE_H * 0.75, lz * 0.6);
        g.add(gusset);
    }

    // Cross-brace — 4 round pipes connecting each adjacent leg pair near the floor
    if (CONE_H > 0) {
        const BRACE_Y = CONE_H * 0.12;
        const PIPE_R  = 0.03;
        // Legs sit at 45°, 135°, 225°, 315° — connect adjacent pairs
        for (let i = 0; i < 4; i++) {
            const a1 = (i / 4) * Math.PI * 2 + Math.PI / 4;
            const a2 = ((i + 1) / 4) * Math.PI * 2 + Math.PI / 4;
            const x1 = Math.cos(a1) * LEG_SPREAD;
            const z1 = Math.sin(a1) * LEG_SPREAD;
            const x2 = Math.cos(a2) * LEG_SPREAD;
            const z2 = Math.sin(a2) * LEG_SPREAD;
            // Midpoint and length
            const mx  = (x1 + x2) / 2;
            const mz  = (z1 + z2) / 2;
            const len = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
            // Angle in XZ plane
            const ang = Math.atan2(z2 - z1, x2 - x1);
            const pipe = new THREE.Mesh(
                new THREE.CylinderGeometry(PIPE_R, PIPE_R, len, 8),
                ssDkMat
            );
            pipe.rotation.z = Math.PI / 2;  // lay cylinder on its side
            pipe.rotation.y = -ang;          // rotate in XZ plane to face next leg
            pipe.position.set(mx, BRACE_Y, mz);
            g.add(pipe);
        }
    }

    // ── Conical bottom (FV only) — tip at y=0, base at y=CONE_H ──
    if (type === 'fv') {
        const cone = new THREE.Mesh(
            new THREE.CylinderGeometry(r, 0.07, CONE_H, 24),
            coneMat
        );
        cone.position.y = CONE_H / 2;   // center between tip (0) and base (CONE_H)
        g.add(cone);
    } else {
        // BBT: inverted dome at base
        const bot = new THREE.Mesh(
            new THREE.SphereGeometry(r, 20, 10, 0, Math.PI*2, Math.PI/2, Math.PI/2),
            ssMat
        );
        bot.rotation.x = Math.PI;
        bot.position.y = BODY_BOT;
        g.add(bot);
    }

    // ── Cylindrical body — from BODY_BOT to BODY_BOT+BODY_H ──
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(r, r, BODY_H, 24),
        ssMat
    );
    body.position.y = BODY_BOT + BODY_H / 2;
    g.add(body);

    // ── Domed top — shallow tapered cap flush with cylinder rim ──
    const DOME_H = r * 0.28;
    const dome = new THREE.Mesh(
        new THREE.CylinderGeometry(r * 0.15, r, DOME_H, 24),
        ssMat
    );
    dome.position.y = BODY_BOT + BODY_H + DOME_H / 2;
    g.add(dome);

    // ── Details ──
    const vent = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.3, 8), ssDkMat);
    vent.position.y = BODY_BOT + BODY_H + r * 0.28 + 0.15;
    g.add(vent);

    g.position.set(x, 0, z);
    scene.add(g);

    // Collision proxy box for octree
    const totalH = BODY_BOT + BODY_H + r * 0.5;
    const proxy  = new THREE.Mesh(
        new THREE.BoxGeometry(r * 2, totalH, r * 2),
        new THREE.MeshStandardMaterial()
    );
    proxy.visible = false;
    proxy.position.set(x, totalH / 2, z);
    worldGroup.add(proxy);

    return g;
}

// ─────────────────────────────────────────────────────────────
//  BUILD WORLD
// ─────────────────────────────────────────────────────────────
const worldGroup = new THREE.Group();

// Floor
const floor = new THREE.Mesh(
    new THREE.BoxGeometry(120, 1, 200),
    floorMat
);
floor.position.set(-7.5, -0.5, 0);
floor.receiveShadow = true;
worldGroup.add(floor);

// Tanks — build visual + add collision proxy to worldGroup
const tankGroups = [];
TANK_LAYOUT.forEach(cfg => {
    tankGroups.push(buildTank(cfg, worldGroup));
});

// Dirt patches scattered around tanks
[
    [-8,3],[-8,-3],[0,0],[-15,5],[-15,-5],
    [5,15],[-5,15],[0,25],[-8,30],[3,40],
    [15,38],[20,32],[-12,-2],[-20,-5],[8,8],
    [-3,-12],[10,-8],[-28,-15],[-26,-8],
    [-5,52],[10,50],[-12,40],
].forEach(([dx,dz]) => makeDirt(dx, 0, dz, 0.4 + Math.random() * 0.7));

// Side dirt on fermenter bodies
const SIDE_DIRT = [
    { x:-25, z: -8, r:3.25, nx:1,  nz:0,  y:5.0, dr:0.5 },
    { x:-25, z: -8, r:3.25, nx:1,  nz:0,  y:3.8, dr:0.4 },
    { x:-25, z:  0, r:3.25, nx:1,  nz:0,  y:5.3, dr:0.55 },
    { x:-25, z:  0, r:3.25, nx:1,  nz:0,  y:4.0, dr:0.35 },
    { x:-25, z:  8, r:3.25, nx:1,  nz:0,  y:4.7, dr:0.5 },
    { x:-25, z:  8, r:3.25, nx:0,  nz:1,  y:4.3, dr:0.4 },
    { x:-10, z: -7, r:2.5,  nx:1,  nz:0,  y:4.5, dr:0.4 },
    { x:-10, z: -7, r:2.5,  nx:-1, nz:0,  y:3.8, dr:0.35 },
    { x:-10, z:  0, r:2.5,  nx:1,  nz:0,  y:4.9, dr:0.45 },
    { x:-10, z:  0, r:2.5,  nx:0,  nz:-1, y:4.0, dr:0.3 },
    { x:-10, z:  7, r:2.5,  nx:1,  nz:0,  y:4.3, dr:0.4 },
    { x:-10, z:  7, r:2.5,  nx:0,  nz:1,  y:5.0, dr:0.45 },
    { x: -3, z: -7, r:2.5,  nx:1,  nz:0,  y:4.6, dr:0.4 },
    { x: -3, z:  0, r:2.5,  nx:-1, nz:0,  y:4.2, dr:0.35 },
    { x: -3, z:  0, r:2.5,  nx:0,  nz:1,  y:5.1, dr:0.45 },
    { x: -3, z:  7, r:2.5,  nx:1,  nz:0,  y:4.4, dr:0.4 },
    { x: -3, z: 28, r:2.5,  nx:1,  nz:0,  y:4.7, dr:0.4 },
    { x: -3, z: 36, r:2.5,  nx:-1, nz:0,  y:4.3, dr:0.35 },
    { x: -3, z: 44, r:2.5,  nx:1,  nz:0,  y:5.0, dr:0.5 },
    { x: -3, z: 52, r:3.25, nx:1,  nz:0,  y:5.3, dr:0.55 },
    { x: -3, z: 60, r:3.25, nx:-1, nz:0,  y:4.5, dr:0.45 },
    { x: 15, z: 52, r:3.25, nx:-1, nz:0,  y:4.3, dr:0.5 },
    { x: 15, z: 44, r:3.25, nx:-1, nz:0,  y:4.7, dr:0.4 },
    { x: 15, z: 36, r:3.5,  nx:-1, nz:0,  y:4.0, dr:0.45 },
    { x:-10, z: 28, r:3.25, nx:1,  nz:0,  y:5.0, dr:0.5 },
    { x:-10, z: 36, r:3.25, nx:0,  nz:-1, y:4.5, dr:0.4 },
    { x:-10, z: 44, r:2.5,  nx:1,  nz:0,  y:4.3, dr:0.35 },
    { x:-10, z: 52, r:3.25, nx:0,  nz:1,  y:4.7, dr:0.45 },
];
SIDE_DIRT.forEach(({ x, z, r, nx, nz, y, dr }) => {
    makeDirtSide(x + nx * r, y, z + nz * r, nx, nz, dr);
});

// ─────────────────────────────────────────────────────────────
//  BREWHOUSE PLATFORM
//  Rotated 90° — platform runs N-S (long in Z), narrow in X
//  Stairs enter from the east side at z=4 (between FV1/FV2)
//  climbing west (decreasing x) up to the platform at x≈-38
//  Platform floor at y=9
// ─────────────────────────────────────────────────────────────
const PLAT_Y      = 9;
const PLAT_W      = 14;
const PLAT_D      = 6;    // narrowed from 7
const PLAT_Z_MID  = -1;
// Compute STAIR_END_X first so platform east edge aligns exactly with it
const _NUM_STEPS  = 36;
const _STAIR_D    = 0.35;
const _STAIR_X0   = -30;
const _STAIR_END  = _STAIR_X0 - _NUM_STEPS * _STAIR_D;
const PLAT_X_MID  = _STAIR_END - PLAT_D / 2;
const platMat     = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.8 });
const railMat     = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.25, metalness: 0.9 });

// Platform deck
const DECK_T = 0.3;
const platform = new THREE.Mesh(
    new THREE.BoxGeometry(PLAT_D, DECK_T, PLAT_W),
    platMat
);
platform.position.set(PLAT_X_MID, PLAT_Y - DECK_T/2, PLAT_Z_MID);
worldGroup.add(platform);

// Support columns (4 corners)
for (const [cx, cz] of [
    [PLAT_X_MID - PLAT_D/2 + 0.5, PLAT_Z_MID - PLAT_W/2 + 0.5],
    [PLAT_X_MID + PLAT_D/2 - 0.5, PLAT_Z_MID - PLAT_W/2 + 0.5],
    [PLAT_X_MID - PLAT_D/2 + 0.5, PLAT_Z_MID + PLAT_W/2 - 0.5],
    [PLAT_X_MID + PLAT_D/2 - 0.5, PLAT_Z_MID + PLAT_W/2 - 0.5],
]) {
    const colH = PLAT_Y - 0.01;
    const col = new THREE.Mesh(new THREE.BoxGeometry(0.25, colH, 0.25), railMat);
    col.position.set(cx, 0.01 + colH / 2, cz);
    worldGroup.add(col);
}

// ── PIPE HANDRAIL HELPER ──
// Draws a run of pipe railing: top rail + mid rail + evenly spaced vertical posts
// x1,y1,z1 → x2,y2,z2 are the two ends of the run at top-rail height
// postAxis: 'x' or 'z' — which axis the run travels along
const PLAT_RAIL_H = 1.0;
const PIPE_R_RAIL = 0.04;   // handrail pipe radius

function addPipeRail(x1, z1, x2, z2, baseY, postSpacing = 1.2) {
    const dx = x2 - x1, dz = z2 - z1;
    const len = Math.sqrt(dx*dx + dz*dz);
    const ang = Math.atan2(dz, dx);
    const mx = (x1+x2)/2, mz = (z1+z2)/2;
    const topY  = baseY + PLAT_RAIL_H;
    const midY  = baseY + PLAT_RAIL_H * 0.5;

    // Top rail
    const topRail = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, len, 8), railMat);
    topRail.rotation.z = Math.PI / 2;
    topRail.rotation.y = -ang;
    topRail.position.set(mx, topY, mz);
    scene.add(topRail);

    // Mid rail
    const midRail = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, len, 8), railMat);
    midRail.rotation.z = Math.PI / 2;
    midRail.rotation.y = -ang;
    midRail.position.set(mx, midY, mz);
    scene.add(midRail);

    // Vertical posts
    const nPosts = Math.max(2, Math.round(len / postSpacing) + 1);
    for (let i = 0; i < nPosts; i++) {
        const t = nPosts === 1 ? 0 : i / (nPosts - 1);
        const px = x1 + dx * t, pz = z1 + dz * t;
        const post = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, PLAT_RAIL_H, 8), railMat);
        post.position.set(px, baseY + PLAT_RAIL_H / 2, pz);
        scene.add(post);
    }

    // Invisible thick collider for physics
    const collider = new THREE.Mesh(new THREE.BoxGeometry(
        Math.abs(dx) > Math.abs(dz) ? len : 0.2,
        PLAT_RAIL_H,
        Math.abs(dz) >= Math.abs(dx) ? len : 0.2
    ), new THREE.MeshStandardMaterial());
    collider.visible = false;
    collider.position.set(mx, baseY + PLAT_RAIL_H / 2, mz);
    worldGroup.add(collider);
}

// Platform edges
const PE = PLAT_Y;   // base y = platform surface
const PW2 = PLAT_W / 2, PD2 = PLAT_D / 2;
const PXW = PLAT_X_MID - PD2;  // west X edge
const PXE = PLAT_X_MID + PD2;  // east X edge
const PZN = PLAT_Z_MID + PW2;  // north Z edge
const PZS = PLAT_Z_MID - PW2;  // south Z edge

// West, north, south full runs
addPipeRail(PXW, PZS, PXW, PZN, PE);           // west
addPipeRail(PXW, PZN, PXE, PZN, PE);           // north
addPipeRail(PXW, PZS, PXE, PZS, PE);           // south

// ── STAIRCASE ──
const NUM_STEPS  = _NUM_STEPS;
const STAIR_W    = 3.0;
const STAIR_D    = _STAIR_D;
const STAIR_H    = PLAT_Y / NUM_STEPS;
const STAIR_Z    = -4;
const STAIR_X0   = _STAIR_X0;
const STAIR_END_X = _STAIR_END;

// East rail — two pipe segments with gap where stairs arrive
{
    const STAIR_GAP_MIN = STAIR_Z - STAIR_W / 2 - 0.2;
    const STAIR_GAP_MAX = STAIR_Z + STAIR_W / 2 + 0.2;
    // South segment: south edge → stair gap
    if (STAIR_GAP_MIN > PZS + 0.1)
        addPipeRail(PXE, PZS, PXE, STAIR_GAP_MIN, PE);
    // North segment: stair gap → north edge
    if (PZN > STAIR_GAP_MAX + 0.1)
        addPipeRail(PXE, STAIR_GAP_MAX, PXE, PZN, PE);
}

// ── VISUAL STEPS — thin tread slabs only (no floor-to-tread pillars) ──
// Each step is just the tread surface + one riser height thick,
// so the underside of the staircase is open and clean.
const STAIR_LEN  = NUM_STEPS * STAIR_D;
const TREAD_T    = STAIR_H + 0.01;   // slab thickness = one riser height
for (let i = 0; i < NUM_STEPS; i++) {
    const treadY = (i + 1) * STAIR_H;
    const step   = new THREE.Mesh(
        new THREE.BoxGeometry(STAIR_D + 0.01, TREAD_T, STAIR_W),
        platMat
    );
    step.position.set(
        STAIR_X0 - i * STAIR_D - STAIR_D / 2,
        treadY - TREAD_T / 2,
        STAIR_Z
    );
    scene.add(step);
}

// ── INVISIBLE PHYSICS RAMP — two segments so underside has ~2.5 m clearance ──
// Segment A = short ground-level approach (first 6 steps).
// Segment B = elevated main ramp. Walk *under* segment B at ground level.
const RAMP_RUN   = STAIR_LEN;
const RAMP_THICK = 0.5;

const SEG_A_STEPS = 6;
const SEG_A_RUN   = SEG_A_STEPS * STAIR_D;
const SEG_A_RISE  = SEG_A_STEPS * STAIR_H;
const SEG_A_HYPO  = Math.sqrt(SEG_A_RUN * SEG_A_RUN + SEG_A_RISE * SEG_A_RISE);
const rampA = new THREE.Mesh(
    new THREE.BoxGeometry(SEG_A_HYPO, RAMP_THICK, STAIR_W - 0.1),
    new THREE.MeshStandardMaterial()
);
rampA.visible = false;
rampA.position.set(STAIR_X0 - SEG_A_RUN / 2, SEG_A_RISE / 2, STAIR_Z);
rampA.rotation.z = -Math.atan2(SEG_A_RISE, SEG_A_RUN);
worldGroup.add(rampA);

const SEG_B_STEPS = NUM_STEPS - SEG_A_STEPS;
const SEG_B_RUN   = SEG_B_STEPS * STAIR_D;
const SEG_B_RISE  = PLAT_Y - SEG_A_RISE;
const SEG_B_HYPO  = Math.sqrt(SEG_B_RUN * SEG_B_RUN + SEG_B_RISE * SEG_B_RISE);
const SEG_B_X0    = STAIR_X0 - SEG_A_RUN;
const rampB = new THREE.Mesh(
    new THREE.BoxGeometry(SEG_B_HYPO, RAMP_THICK, STAIR_W - 0.1),
    new THREE.MeshStandardMaterial()
);
rampB.visible = false;
rampB.position.set(SEG_B_X0 - SEG_B_RUN / 2, SEG_A_RISE + SEG_B_RISE / 2, STAIR_Z);
rampB.rotation.z = -Math.atan2(SEG_B_RISE, SEG_B_RUN);
worldGroup.add(rampB);

// Invisible floor under the raised platform
const underPlatFloor = new THREE.Mesh(
    new THREE.BoxGeometry(PLAT_D + 1.0, 0.4, PLAT_W + 2.0),
    new THREE.MeshStandardMaterial()
);
underPlatFloor.visible = false;
underPlatFloor.position.set(PLAT_X_MID, -0.2, PLAT_Z_MID);
worldGroup.add(underPlatFloor);

// ── STAIR HANDRAILS — round pipe style matching platform railings ──
const RAIL_H      = 1.1;
const RAIL_BOT_Y  = RAIL_H;
const RAIL_TOP_Y  = PLAT_Y + RAIL_H;

for (const sz of [-1, 1]) {
    const railZ = STAIR_Z + sz * (STAIR_W / 2 + 0.12);

    // Sloped top rail pipe — one cylinder along the hypotenuse
    const HYPO = Math.sqrt(STAIR_LEN * STAIR_LEN + PLAT_Y * PLAT_Y);
    const RAIL_ANGLE = -Math.atan2(PLAT_Y, STAIR_LEN);
    const RAIL_CEN_X = STAIR_X0 - STAIR_LEN / 2;
    const RAIL_CEN_Y = (RAIL_BOT_Y + RAIL_TOP_Y) / 2;

    const topRail = new THREE.Mesh(
        new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, HYPO, 8),
        railMat
    );
    topRail.rotation.z = Math.PI / 2 + RAIL_ANGLE;
    topRail.position.set(RAIL_CEN_X, RAIL_CEN_Y, railZ);
    scene.add(topRail);

    // Mid rail pipe — parallel, halfway up
    const MID_BOT_Y = RAIL_BOT_Y * 0.5;
    const MID_TOP_Y = PLAT_Y + RAIL_H * 0.5;
    const midRail = new THREE.Mesh(
        new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, HYPO, 8),
        railMat
    );
    midRail.rotation.z = Math.PI / 2 + RAIL_ANGLE;
    midRail.position.set(RAIL_CEN_X, (MID_BOT_Y + MID_TOP_Y) / 2, railZ);
    scene.add(midRail);

    // Vertical balusters at each step interval
    for (let i = 0; i <= NUM_STEPS; i += 3) {
        const bx    = STAIR_X0 - i * STAIR_D;
        const tread = i * STAIR_H;
        const t     = i / NUM_STEPS;
        const railTopHere = RAIL_BOT_Y + t * (RAIL_TOP_Y - RAIL_BOT_Y);
        const postH = railTopHere - tread;
        if (postH < 0.1) continue;
        const post = new THREE.Mesh(
            new THREE.CylinderGeometry(PIPE_R_RAIL, PIPE_R_RAIL, postH, 8),
            railMat
        );
        post.position.set(bx, tread + postH / 2, railZ);
        scene.add(post);
    }

    // Newel post at top — vertical pipe from platform surface up to rail
    const postTop = new THREE.Mesh(
        new THREE.CylinderGeometry(PIPE_R_RAIL * 1.5, PIPE_R_RAIL * 1.5, RAIL_H, 8),
        railMat
    );
    postTop.position.set(STAIR_END_X, PLAT_Y + RAIL_H / 2, railZ);
    scene.add(postTop);
}

// ── STAIR SIDE WALL COLLIDERS — solid invisible walls prevent falling through handrails ──
for (const sz of [-1, 1]) {
    const wallZ = STAIR_Z + sz * (STAIR_W / 2 + 0.15);
    // A vertical wall the full height and run of the staircase
    const wallH  = PLAT_Y + RAIL_H;
    const wallLen = Math.sqrt(STAIR_LEN * STAIR_LEN + PLAT_Y * PLAT_Y) * 1.05;
    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(wallLen, wallH, 0.22),
        new THREE.MeshStandardMaterial()
    );
    wall.visible = false;
    wall.position.set(STAIR_X0 - STAIR_LEN / 2, wallH / 2, wallZ);
    wall.rotation.z = -Math.atan2(PLAT_Y, STAIR_LEN);
    worldGroup.add(wall);
}

// Brewhouse vessels — 6 large cylindrical tanks surrounding the platform, no cones
// Looking up the stairs: left=south, across=north, far-right=west end, near-right=east-north
const BREW_Y = PLAT_Y;   // tanks sit on ground level, rise up beside platform
const BREW_TANKS = [
    { x: PLAT_X_MID - 0,      z: PLAT_Z_MID - PLAT_W/2 - 3.5, r: 3.2, h: 6.5, legH: 4, label: 'Mash Tun', steamStack: true  },
    { x: PLAT_X_MID - 0,      z: PLAT_Z_MID + PLAT_W/2 + 4,   r: 3.2, h: 6.5, legH: 4, label: 'CLT',      steamStack: false },
    { x: PLAT_X_MID - 7,      z: PLAT_Z_MID + PLAT_W/2 - 19.5,r: 3.2, h: 6.5, legH: 4, label: 'HLT',      steamStack: false },
    { x: PLAT_X_MID - PLAT_D/2 - 3,   z: PLAT_Z_MID + 4,      r: 3.0, h: 6.5, legH: 4, label: 'Kettle',   steamStack: true  },
    { x: PLAT_X_MID - PLAT_D/2 - 3.5, z: PLAT_Z_MID - 4,      r: 3.5, h: 6.5, legH: 4, label: 'lauter',   steamStack: true  },
    { x: PLAT_X_MID + PLAT_D/2 + 4,   z: PLAT_Z_MID + 4.75,   r: 4,   h: 6.5, legH: 4, label: 'Whirlpool',steamStack: true  },
];

BREW_TANKS.forEach(cfg => {
    const g = new THREE.Group();

    // Legs are tall enough so tank body bottom sits just above mid-platform height
    const LEG_H      = cfg.legH;
    const BODY_BOT   = LEG_H;
    const DOME_H     = cfg.r * 0.22;
    const LEG_SPREAD = cfg.r * 0.85;

    // Legs (4) — with individual collision proxies
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
        const lx = Math.cos(angle) * LEG_SPREAD;
        const lz = Math.sin(angle) * LEG_SPREAD;
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, LEG_H, 8), ssDkMat);
        leg.position.set(lx, LEG_H / 2, lz);
        g.add(leg);
        const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.07, 8), ssDkMat);
        foot.position.set(lx, 0.035, lz);
        g.add(foot);
        // Invisible leg collider in worldGroup so octree picks it up
        const legCol = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, LEG_H, 8), new THREE.MeshStandardMaterial());
        legCol.visible = false;
        legCol.position.set(cfg.x + lx, LEG_H / 2, cfg.z + lz);
        worldGroup.add(legCol);
    }

    // Square pipe brace near base
    const PIPE_R = 0.03;
    for (let i = 0; i < 4; i++) {
        const a1 = (i / 4) * Math.PI * 2 + Math.PI / 4;
        const a2 = ((i + 1) / 4) * Math.PI * 2 + Math.PI / 4;
        const x1 = Math.cos(a1) * LEG_SPREAD, z1 = Math.sin(a1) * LEG_SPREAD;
        const x2 = Math.cos(a2) * LEG_SPREAD, z2 = Math.sin(a2) * LEG_SPREAD;
        const len = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
        const ang = Math.atan2(z2-z1, x2-x1);
        const pipe = new THREE.Mesh(new THREE.CylinderGeometry(PIPE_R, PIPE_R, len, 8), ssDkMat);
        pipe.rotation.z = Math.PI / 2;
        pipe.rotation.y = -ang;
        pipe.position.set((x1+x2)/2, LEG_H * 0.12, (z1+z2)/2);
        g.add(pipe);
    }

    // Main cylindrical body — starts cleanly at BODY_BOT, no bottom cone piece
    const body = new THREE.Mesh(new THREE.CylinderGeometry(cfg.r, cfg.r, cfg.h, 24), ssMat);
    body.position.y = BODY_BOT + cfg.h / 2;
    g.add(body);

    // Shallow tapered top cap
    const dome = new THREE.Mesh(
        new THREE.CylinderGeometry(cfg.r * 0.15, cfg.r, DOME_H, 24),
        ssMat
    );
    dome.position.y = BODY_BOT + cfg.h + DOME_H / 2;
    g.add(dome);

    // Vent / steam stack on top
    const CEIL_Y     = 22;   // ceiling height in world units
    const stackBot   = BODY_BOT + cfg.h + DOME_H;
    if (cfg.steamStack) {
        // Large-diameter steam stack rising to ceiling
        const stackR  = cfg.r * 0.13;
        const stackH  = CEIL_Y - stackBot;
        const stack = new THREE.Mesh(new THREE.CylinderGeometry(stackR, stackR, stackH, 16), ssMat);
        stack.position.y = stackBot + stackH / 2;
        g.add(stack);
        // Collision proxy for the stack — full height cylinder in worldGroup
        const stackProxy = new THREE.Mesh(
            new THREE.CylinderGeometry(stackR, stackR, stackH, 8),
            new THREE.MeshStandardMaterial()
        );
        stackProxy.visible = false;
        stackProxy.position.set(cfg.x, stackBot + stackH / 2, cfg.z);
        worldGroup.add(stackProxy);
    } else {
        // Small vent pipe for CLT/HLT
        const vent = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.4, 8), ssDkMat);
        vent.position.y = stackBot + 0.2;
        g.add(vent);
    }

    g.position.set(cfg.x, 0, cfg.z);
    scene.add(g);

    // Collision proxy — starts at LEG_H so player can walk freely under the legs
    const proxyH = cfg.h + DOME_H;
    const proxy = new THREE.Mesh(
        new THREE.BoxGeometry(cfg.r * 2, proxyH, cfg.r * 2),
        new THREE.MeshStandardMaterial()
    );
    proxy.visible = false;
    proxy.position.set(cfg.x, LEG_H + proxyH / 2, cfg.z);
    worldGroup.add(proxy);
});

// buildTable(x, y, z, w, d) — w=width(X), d=depth(Z), y=floor height table sits on
const ssMat2 = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.85, roughness: 0.2 });
function buildTable(x, y, z, w, d) {
    const TABLE_H  = 0.9;   // worktop height above floor
    const TOP_T    = 0.04;
    const SHELF_H  = 0.35;  // lower shelf height above floor
    const LEG_R    = 0.025;
    const g = new THREE.Group();

    // Worktop
    const top = new THREE.Mesh(new THREE.BoxGeometry(w, TOP_T, d), ssMat2);
    top.position.y = TABLE_H;
    g.add(top);

    // Lower shelf
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(w - 0.1, TOP_T * 0.8, d - 0.1), ssMat2);
    shelf.position.y = SHELF_H;
    g.add(shelf);

    // 4 legs
    for (const [lx, lz] of [
        [ w/2 - 0.06,  d/2 - 0.06],
        [-w/2 + 0.06,  d/2 - 0.06],
        [ w/2 - 0.06, -d/2 + 0.06],
        [-w/2 + 0.06, -d/2 + 0.06],
    ]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(LEG_R, LEG_R, TABLE_H, 8), ssMat2);
        leg.position.set(lx, TABLE_H / 2, lz);
        g.add(leg);
    }

    // Cross braces on long sides
    for (const lz of [d/2 - 0.06, -d/2 + 0.06]) {
        const brace = new THREE.Mesh(new THREE.CylinderGeometry(LEG_R * 0.8, LEG_R * 0.8, w - 0.12, 8), ssMat2);
        brace.rotation.z = Math.PI / 2;
        brace.position.set(0, SHELF_H + 0.15, lz);
        g.add(brace);
    }

    g.position.set(x, y, z);
    scene.add(g);

    // Collision proxy for the worktop
    const col = new THREE.Mesh(new THREE.BoxGeometry(w, TABLE_H + TOP_T, d), new THREE.MeshStandardMaterial());
    col.visible = false;
    col.position.set(x, y + (TABLE_H + TOP_T) / 2, z);
    worldGroup.add(col);
    worldOctree.fromGraphNode(worldGroup);  // re-bake octree to include table
}

//  MEZZANINE  (-z south wall, runs in X direction)
//  Single level, dark steel, flat-bar railings
//  Rooms below with double doors, stairs run west→east with mid-landing
// ─────────────────────────────────────────────────────────────
const darkMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8, metalness: 0.6 });
const roomMat  = new THREE.MeshStandardMaterial({ color: 0xc8c0b4, roughness: 0.85 });

const MEZ_Y    = 14;
const MEZ_X0   = -70;   // east end
const MEZ_X1   = 20;    // west end — covers full stair run
const MEZ_Z0   = -42;   // south edge (back wall)
const MEZ_Z1   = -33;   // north edge (open to brewery floor)

const MEZ_D    = MEZ_Z1 - MEZ_Z0;
const DECK_T2  = 0.25;

// ── Flat-bar railing helper ──
function addFlatBarRail(x1, z1, x2, z2, baseY, nBars = 4) {
    const dx = x2-x1, dz = z2-z1;
    const len = Math.sqrt(dx*dx + dz*dz);
    if (len < 0.1) return;
    const ang = Math.atan2(dz, dx);
    const mx = (x1+x2)/2, mz = (z1+z2)/2;
    const RAIL_H2 = 1.05, BAR_H = 0.04;
    for (let b = 0; b <= nBars; b++) {
        const by = baseY + (b / nBars) * RAIL_H2;
        const bar = new THREE.Mesh(new THREE.BoxGeometry(len, BAR_H, 0.05), darkMat);
        bar.rotation.y = -ang;
        bar.position.set(mx, by, mz);
        scene.add(bar);
    }
    const nPosts = Math.max(2, Math.round(len / 1.2) + 1);
    for (let i = 0; i < nPosts; i++) {
        const t = i / (nPosts-1);
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.06, RAIL_H2, 0.06), darkMat);
        post.position.set(x1 + dx*t, baseY + RAIL_H2/2, z1 + dz*t);
        scene.add(post);
    }
    const col = new THREE.Mesh(new THREE.BoxGeometry(
        Math.abs(dx) > Math.abs(dz) ? len : 0.2, RAIL_H2,
        Math.abs(dz) >= Math.abs(dx) ? len : 0.2
    ), new THREE.MeshStandardMaterial());
    col.visible = false;
    col.position.set(mx, baseY + RAIL_H2/2, mz);
    worldGroup.add(col);
}

// ── Mezzanine deck ──

mezDeck.position.set((MEZ_X0+MEZ_X1)/2, MEZ_Y - DECK_T2/2, (MEZ_Z0+MEZ_Z1)/2);

// ── Rooms below mezzanine — proportions from actual floorplan ──
// Walking west (-X): Brewer Office → Closet → Hop Cold → Malt Mill → Equipment/Grain
// Key constraints from stair geometry:
//   Brewer Office door at X=17 — east of stair foot (X=14), visible before stairs ✓
//   Hop Cold door at X=-8 — between mid-landing (X=2) and stair top (X=-13.5) ✓
const ROOM_H  = MEZ_Y - 0.02;
const DOOR_H  = 2.8;
const FRAME_R = 0.08;

const R_OFFI_X0  = -5;    const R_OFFI_X1  = MEZ_X1;  // Brewer Office:  -5 → 20  (25 units)
const R_CLOS_X0  = -12;   const R_CLOS_X1  = R_OFFI_X0; // Closet:       -12 → -5  ( 7 units)
const R_HOPC_X0  = -15;   const R_HOPC_X1  = R_CLOS_X0; // Hop Cold:     -32 → -12 (20 units)
const R_MILL_X0  = -40;   const R_MILL_X1  = R_HOPC_X0; // Malt Mill:    -51 → -32 (19 units)
const R_EQUIP_X0 = MEZ_X0; const R_EQUIP_X1 = R_MILL_X0; // Boiler:   -70 → -51 (19 units)

function buildRoom(rx0, rx1, doorCenterX, doorW) {
    const rw   = rx1 - rx0;
    const zmid = (MEZ_Z0 + MEZ_Z1) / 2;

    // South wall
    const sw = new THREE.Mesh(new THREE.BoxGeometry(rw, ROOM_H, 0.2), roomMat);
    sw.position.set((rx0+rx1)/2, ROOM_H/2, MEZ_Z0);
    worldGroup.add(sw);
    // West divider wall
    const ww = new THREE.Mesh(new THREE.BoxGeometry(0.2, ROOM_H, MEZ_D), roomMat);
    ww.position.set(rx0, ROOM_H/2, zmid);
    worldGroup.add(ww);

    // North face split around door
    const leftW  = doorCenterX - doorW/2 - rx0;
    const rightW = rx1 - (doorCenterX + doorW/2);
    if (leftW > 0.05) {
        const nw = new THREE.Mesh(new THREE.BoxGeometry(leftW, ROOM_H, 0.2), roomMat);
        nw.position.set(rx0 + leftW/2, ROOM_H/2, MEZ_Z1);
        worldGroup.add(nw);
    }
    if (rightW > 0.05) {
        const nw = new THREE.Mesh(new THREE.BoxGeometry(rightW, ROOM_H, 0.2), roomMat);
        nw.position.set(rx1 - rightW/2, ROOM_H/2, MEZ_Z1);
        worldGroup.add(nw);
    }
    const transomH = ROOM_H - DOOR_H;
    const nw3 = new THREE.Mesh(new THREE.BoxGeometry(doorW, transomH, 0.2), roomMat);
    nw3.position.set(doorCenterX, DOOR_H + transomH/2, MEZ_Z1);
    worldGroup.add(nw3);
    // Door frame
    for (const fdx of [-doorW/2, doorW/2]) {

addFlatBarRail(MEZ_X1, MEZ_Z0, MEZ_X1, MEZ_Z1, MEZ_Y);          // west end wall

// ── Mezzanine Stairs — two flights with mid-landing ──
// Stairs run in X: foot at MS_X_BOT (east/high X), top at MS_X_TOP (west/low X)
// Each step rises in Y and steps in -X.
// Mid-landing sits at exactly MEZ_Y/2.
// Physics: one flat invisible ramp box per flight, axis-aligned (no tricky pivot math).

const MS_STEPS   = 36;
const MS_W       = 4.0;                        // stair width — now 4 units wide
const MS_Z       = MEZ_Z1 + MS_W / 2 + 0.65;  // stair center Z, ~0.65m gap from mez deck north face
const MS_X_BOT   = MEZ_X1 - 6;                 // foot of stairs (east)
const MS_X_TOP   = MEZ_X1 - 30;                // top of stairs (west)
const MS_TOTAL_RUN = MS_X_BOT - MS_X_TOP;      // total horizontal run
const LAND_Y     = MEZ_Y / 2;                  // mid-landing height = exactly half of mez height
const HALF_STEPS = MS_STEPS / 2;               // 18 steps per flight
const STEP_H     = LAND_Y / HALF_STEPS;        // rise per step
const STEP_D     = MS_TOTAL_RUN / MS_STEPS;    // run per step (same for both flights)
const LAND_W     = 3.5;                         // mid-landing depth in X
const LAND_D     = MS_W;                        // mid-landing width in Z (same as stairs)

// Where does the lower flight end / landing begins?
// After HALF_STEPS steps of width STEP_D each, starting from MS_X_BOT going west (-X):
const LAND_X_E   = MS_X_BOT - HALF_STEPS * STEP_D;   // east edge of mid-landing
const LAND_X_W   = LAND_X_E - LAND_W;                 // west edge of mid-landing
const LAND_X     = (LAND_X_E + LAND_X_W) / 2;         // center of mid-landing

// Upper flight starts at west edge of landing, goes to MS_X_TOP
const UPPER_X_BOT = LAND_X_W;   // foot of upper flight
// (UPPER_X_BOT - MS_X_TOP) should equal MS_TOTAL_RUN / 2 = HALF_STEPS * STEP_D ✓

const ms_treadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.5 });
const RAIL_R = 0.04;
const RAIL_RISE = 1.05;   // handrail height above tread surface

// ── Visual steps — lower flight ──
for (let i = 0; i < HALF_STEPS; i++) {
    const treadY = (i + 1) * STEP_H;                            // top of this tread
    const step = new THREE.Mesh(new THREE.BoxGeometry(STEP_D, STEP_H, MS_W), ms_treadMat);
    step.position.set(MS_X_BOT - i * STEP_D - STEP_D / 2, treadY - STEP_H / 2, MS_Z);
    scene.add(step);
}

// ── Visual steps — upper flight ──
for (let i = 0; i < HALF_STEPS; i++) {
    const treadY = LAND_Y + (i + 1) * STEP_H;
    const step = new THREE.Mesh(new THREE.BoxGeometry(STEP_D, STEP_H, MS_W), ms_treadMat);
    step.position.set(UPPER_X_BOT - i * STEP_D - STEP_D / 2, treadY - STEP_H / 2, MS_Z);
    scene.add(step);
}

// ── Mid-landing (visual + collider) ──
const landMesh = new THREE.Mesh(new THREE.BoxGeometry(LAND_W, DECK_T2, MS_W + 0.6), darkMat);
landMesh.position.set(LAND_X, LAND_Y - DECK_T2 / 2, MS_Z);
worldGroup.add(landMesh);   // in worldGroup so octree picks it up as solid surface

// Mid-landing railing — north side only (south side faces mez wall gap, leave open)
addFlatBarRail(LAND_X_E, MS_Z + MS_W / 2 - 0.2, LAND_X_W, MS_Z + MS_W / 2 - 0.2, LAND_Y);

// Mid-landing support columns
for (const lx of [LAND_X_E - 0.15, LAND_X_W + 0.15]) {
    for (const lz of [MS_Z - MS_W / 2, MS_Z + MS_W / 2]) {
        const col = new THREE.Mesh(new THREE.BoxGeometry(0.2, LAND_Y, 0.2), darkMat);
        col.position.set(lx, LAND_Y / 2, lz);
        worldGroup.add(col);
    }
}

// ── Top landing — sits at the TOP of the stairs (MS_X_TOP, the west/high end) ──
// The stair climbs westward (-X). MS_X_TOP is where the last step lands.
// Platform extends a few units further west from there, with 4 legs to the floor.
// A short bridge then connects the platform's SOUTH edge to the mez deck's north face (MEZ_Z1).
//
//   MEZ deck (south, at MEZ_Z1=-33)
//       |  bridge (in Z, short)
//   [platform] ← stair top arrives here from the east (MS_X_TOP)
//       ↑
//   4 floor legs

const TOP_LAND_W = 4.0;                        // size in X (stair width direction)
const TOP_LAND_D = MS_W;                           // match stair width
// Center the platform in X around MS_X_TOP, sitting north of MEZ_Z1
const TOP_LAND_X = UPPER_X_BOT - HALF_STEPS * STEP_D - TOP_LAND_W / 2;  // west edge at actual stair end
const TOP_LAND_Z = MS_Z;                          // centered same as stairs in Z

// Platform deck
const topLandMesh = new THREE.Mesh(new THREE.BoxGeometry(TOP_LAND_W, DECK_T2, TOP_LAND_D), darkMat);
topLandMesh.position.set(TOP_LAND_X, MEZ_Y - DECK_T2 / 2, TOP_LAND_Z);
worldGroup.add(topLandMesh);

// 4 support legs — floor to mez deck height
for (const lx of [TOP_LAND_X - TOP_LAND_W / 2 + 0.2, TOP_LAND_X + TOP_LAND_W / 2 - 0.2]) {
    for (const lz of [TOP_LAND_Z - TOP_LAND_D / 2 + 0.2, TOP_LAND_Z + TOP_LAND_D / 2 - 0.2]) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.25, MEZ_Y, 0.25), darkMat);
        leg.position.set(lx, MEZ_Y / 2, lz);
        worldGroup.add(leg);
    }
}

// Railings: north face (open to brewery), east and west sides
// South face is open — connects to bridge toward mez deck
addFlatBarRail(TOP_LAND_X - TOP_LAND_W / 2, TOP_LAND_Z + TOP_LAND_D / 2,
               TOP_LAND_X + TOP_LAND_W / 2, TOP_LAND_Z + TOP_LAND_D / 2, MEZ_Y); // north rail
addFlatBarRail(TOP_LAND_X - TOP_LAND_W / 2, TOP_LAND_Z - TOP_LAND_D / 2,
               TOP_LAND_X - TOP_LAND_W / 2, TOP_LAND_Z + TOP_LAND_D / 2, MEZ_Y); // west rail

// ── Mez north face railing — full run with gap where platform connects ──
// Platform spans X: TOP_LAND_X - TOP_LAND_W/2  to  TOP_LAND_X + TOP_LAND_W/2
addFlatBarRail(-57, MEZ_Z1, TOP_LAND_X - TOP_LAND_W / 2, MEZ_Z1, MEZ_Y);  // east of stair platform, skip meeting room window wall
addFlatBarRail(TOP_LAND_X + TOP_LAND_W / 2, MEZ_Z1, 9, MEZ_Z1, MEZ_Y); // west of platform, stop at Sensory/Lab east wall

// ── Bridge slab — fills the Z gap between platform south edge and mez north face ──
const BRIDGE_GAP   = TOP_LAND_Z - TOP_LAND_D / 2 - MEZ_Z1;   // = MS_Z gap (~0.65)
const BRIDGE_CEN_Z = MEZ_Z1 + BRIDGE_GAP / 2;
const bridgeSlab = new THREE.Mesh(new THREE.BoxGeometry(TOP_LAND_W, DECK_T2, BRIDGE_GAP), darkMat);
bridgeSlab.position.set(TOP_LAND_X, MEZ_Y - DECK_T2 / 2, BRIDGE_CEN_Z);
worldGroup.add(bridgeSlab);

// ── Physics ramps — simple tilted boxes, no tricky pivot offsets ──
// Strategy: compute the hypotenuse and angle for each flight, then position
// the box center at the midpoint of its run/rise. The rotation.z sign convention:
// stairs go in -X direction, so climbing means Y increases as X decreases.
// rotation.z = +angle tilts the box so its left end (lower X = higher elevation) is up. ✓

const LO_RUN  = HALF_STEPS * STEP_D;            // horizontal run of lower flight
const LO_RISE = LAND_Y;                          // vertical rise of lower flight (0 → LAND_Y)
const LO_HYPO = Math.sqrt(LO_RUN * LO_RUN + LO_RISE * LO_RISE);
const LO_ANGLE = Math.atan2(LO_RISE, LO_RUN);   // positive angle
const LO_CEN_X = MS_X_BOT - LO_RUN / 2;
const LO_CEN_Y = LO_RISE / 2;                   // midpoint of rise: 0 to LAND_Y

const rampLo = new THREE.Mesh(new THREE.BoxGeometry(LO_HYPO, 0.5, MS_W - 0.1), new THREE.MeshStandardMaterial());
rampLo.visible = false;
rampLo.position.set(LO_CEN_X, LO_CEN_Y, MS_Z);
rampLo.rotation.z = -LO_ANGLE;  // negative: tilts high end toward lower X (west = uphill)
worldGroup.add(rampLo);

const HI_RUN  = HALF_STEPS * STEP_D;            // horizontal run of upper flight
const HI_RISE = MEZ_Y - LAND_Y;                 // vertical rise (LAND_Y → MEZ_Y)
const HI_HYPO = Math.sqrt(HI_RUN * HI_RUN + HI_RISE * HI_RISE);
const HI_ANGLE = Math.atan2(HI_RISE, HI_RUN);
const HI_CEN_X = UPPER_X_BOT - HI_RUN / 2;
const HI_CEN_Y = LAND_Y + HI_RISE / 2;         // midpoint of rise: LAND_Y to MEZ_Y

const rampHi = new THREE.Mesh(new THREE.BoxGeometry(HI_HYPO, 0.5, MS_W - 0.1), new THREE.MeshStandardMaterial());
rampHi.visible = false;
rampHi.position.set(HI_CEN_X, HI_CEN_Y, MS_Z);
rampHi.rotation.z = -HI_ANGLE;  // negative: same — high end toward lower X (west = uphill)
worldGroup.add(rampHi);

// ── Handrails — sloped pipe + balusters grounded on each tread + collision walls ──
const STAIR_ACTUAL_TOP_X = UPPER_X_BOT - HALF_STEPS * STEP_D;

for (const sz of [-1, 1]) {
    const rz = MS_Z + sz * (MS_W / 2 - 0.2);  // inset from stair edge so balusters land on treads

    // ── Sloped rail pipes ──
    // Lower flight: rail center is midpoint along slope, RAIL_RISE above the midpoint tread
    const lo_railCenX = MS_X_BOT - LO_RUN / 2;
    const lo_railCenY = LO_RISE / 2 + RAIL_RISE;
    const lo_rail = new THREE.Mesh(new THREE.CylinderGeometry(RAIL_R, RAIL_R, LO_HYPO, 8), darkMat);
    lo_rail.rotation.z = Math.PI / 2 - LO_ANGLE;
    lo_rail.position.set(lo_railCenX, lo_railCenY, rz);
    scene.add(lo_rail);

    // Upper flight
    const hi_railCenX = UPPER_X_BOT - HI_RUN / 2;
    const hi_railCenY = LAND_Y + HI_RISE / 2 + RAIL_RISE;
    const hi_rail = new THREE.Mesh(new THREE.CylinderGeometry(RAIL_R, RAIL_R, HI_HYPO, 8), darkMat);
    hi_rail.rotation.z = Math.PI / 2 - HI_ANGLE;
    hi_rail.position.set(hi_railCenX, hi_railCenY, rz);
    scene.add(hi_rail);

    // ── Balusters — each one starts AT its tread surface, height = RAIL_RISE exactly ──
    // Lower flight
    for (let i = 0; i <= HALF_STEPS; i += 3) {
        const bx = MS_X_BOT - i * STEP_D;
        const treadY = i * STEP_H;          // top of tread i
        const bal = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, RAIL_RISE, 8), darkMat);
        bal.position.set(bx, treadY + RAIL_RISE / 2, rz);
        scene.add(bal);
    }
    // Upper flight
    for (let i = 0; i <= HALF_STEPS; i += 3) {
        const bx = UPPER_X_BOT - i * STEP_D;
        const treadY = LAND_Y + i * STEP_H;
        const bal = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, RAIL_RISE, 8), darkMat);
        bal.position.set(bx, treadY + RAIL_RISE / 2, rz);
        scene.add(bal);
    }

    // ── Newel posts ──
    // Foot of lower flight — post from floor up to rail
    const footPost = new THREE.Mesh(new THREE.CylinderGeometry(RAIL_R * 1.5, RAIL_R * 1.5, RAIL_RISE, 8), darkMat);
    footPost.position.set(MS_X_BOT, RAIL_RISE / 2, rz);
    scene.add(footPost);
    // Top of upper flight — post from platform deck up to rail
    const topPost = new THREE.Mesh(new THREE.CylinderGeometry(RAIL_R * 1.5, RAIL_R * 1.5, RAIL_RISE, 8), darkMat);
    topPost.position.set(STAIR_ACTUAL_TOP_X, MEZ_Y + RAIL_RISE / 2, rz);
    scene.add(topPost);
    // Newel at mid-landing transition (bottom of upper flight)
    const midPost = new THREE.Mesh(new THREE.CylinderGeometry(RAIL_R * 1.5, RAIL_R * 1.5, RAIL_RISE, 8), darkMat);
    midPost.position.set(UPPER_X_BOT, LAND_Y + RAIL_RISE / 2, rz);
    scene.add(midPost);
}

// ── Invisible collision walls along each side of both stair flights ──
// A thin vertical wall the full height+run of each flight keeps player from walking through rails.
for (const sz of [-1, 1]) {
    const wallZ = MS_Z + sz * (MS_W / 2 - 0.05);  // match rail inset

    // Lower flight wall — tilted to match slope
    const loWall = new THREE.Mesh(
        new THREE.BoxGeometry(LO_HYPO, RAIL_RISE * 1.5, 0.15),
        new THREE.MeshStandardMaterial()
    );
    loWall.visible = false;
    loWall.rotation.z = -LO_ANGLE;
    loWall.position.set(MS_X_BOT - LO_RUN / 2, LO_RISE / 2 + RAIL_RISE * 0.5, wallZ);
    worldGroup.add(loWall);

    // Upper flight wall
    const hiWall = new THREE.Mesh(
        new THREE.BoxGeometry(HI_HYPO, RAIL_RISE * 1.5, 0.15),
        new THREE.MeshStandardMaterial()
    );
    hiWall.visible = false;
    hiWall.rotation.z = -HI_ANGLE;
    hiWall.position.set(UPPER_X_BOT - HI_RUN / 2, LAND_Y + HI_RISE / 2 + RAIL_RISE * 0.5, wallZ);
    worldGroup.add(hiWall);
}

// ── Mid-landing south rail (mez-wall side) — was removed, now restored ──
// This is the rail on the south edge of the mid-landing facing the mez wall gap.
addFlatBarRail(LAND_X_E, MS_Z - MS_W / 2 + 0.2, LAND_X_W, MS_Z - MS_W / 2 + 0.2, LAND_Y);

// Re-bake octree
worldOctree.fromGraphNode(worldGroup);



// Mezzanine spans X direction along south (-z) wall
// X: from -55 (west) to -10 (east, near cellar tanks)
// Z: south wall at z=-22, mezzanine depth extends to z=-13 (9 units into building)


// ─────────────────────────────────────────────────────────────
//  MEZZANINE OFFICES
//
//  Floor at y = MEZ_Y = 14.
//  Interior ceiling height: OFF_H = 3.5  (ceiling slab inside each room)
//  Outer walls (back + end caps) extend full height to roof: OFF_H_FULL = CEIL_Y - MEZ_Y = 8
//  Pathway between guardrail (MEZ_Z1=-33) and office front face is open to the roof.
//
//  Z layout (north = more negative z here):
//    MEZ_Z1 = -33  ← guardrail (north edge of mez deck)
//    pathway = 4 units wide
//    OFF_Z_FRONT = -37  ← front face of all offices (corridor side)
//    OFF_Z_BACK  = -42  ← back wall (= MEZ_Z0, south wall of building)
//    OFF_DEPTH   = 5 units
//
//  X layout (west = higher X, east = lower/more-negative X):
//    Sensory/Lab  x:  20 →  9   door on EAST side wall (x=9), path dead-ends here
//    Paul's       x:   9 → -1   door on front (z=OFF_Z_FRONT)
//    Tiffany's    x:  -1 → -11  door on front
//    Closet       x: -11 → -16  door on front (smaller)
//    Julien's     x: -16 → -26  door on front
//    Miranda's    x: -26 → -36  door on front
//    Trevor's     x: -36 → -46  door on front
//    Sales        x: -46 → -57  door on front
//    Meeting Room x: -57 → -70  door on WEST side wall (x=-57), path dead-ends here
//
//  The corridor (pathway) runs only between x=9 and x=-57.
//  The end rooms' side walls naturally close the corridor ends.
// ─────────────────────────────────────────────────────────────

const OFF_FLOOR_Y  = MEZ_Y;           // 14
const OFF_H        = 3.5;             // interior room height (floor → ceiling slab)
const OFF_H_FULL   = CEIL_Y - MEZ_Y;  // 8 — outer walls go all the way to the roof
const OFF_WALL_T   = 0.18;
const OFF_Z_FRONT  = MEZ_Z1 - 4.0;   // -37
const OFF_Z_BACK   = MEZ_Z0;          // -42
const OFF_DEPTH    = OFF_Z_FRONT - OFF_Z_BACK;  // 5
const OFF_DOOR_H   = 2.4;

const offWallMat  = new THREE.MeshStandardMaterial({ color: 0xd4ccc0, roughness: 0.9, metalness: 0.0 });
const offGlassMat = new THREE.MeshStandardMaterial({ color: 0x88bbdd, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.35 });
const offFrameMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.7 });

// Labels removed — makeOfficeLabel is now a no-op
function makeOfficeLabel(text, x, y, z) { /* labels removed */ }

// ── Wall helpers ──
// wallBox: place a solid box in worldGroup. y0 = bottom world-y, h = height.
function wallBox(cx, y0, cz, w, h, d) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), offWallMat);
    m.position.set(cx, y0 + h / 2, cz);
    worldGroup.add(m);
}

// ceilBox: thin ceiling slab at interior ceiling height
function ceilBox(cx, cz, w, d) {
    const T = 0.15;
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, T, d), offWallMat);
    m.position.set(cx, OFF_FLOOR_Y + OFF_H + T / 2, cz);
    worldGroup.add(m);
}

// ── Glass panel helper ──
function glassPanel(px0, px1, cz, panelH) {
    const pw   = px1 - px0;
    const pxM  = (px0 + px1) / 2;
    const FR   = 0.07;
    const FD   = OFF_WALL_T * 1.2;

    // Frame: top bar, left post, right post
    const topBar = new THREE.Mesh(new THREE.BoxGeometry(pw, FR, FD), offFrameMat);
    topBar.position.set(pxM, OFF_FLOOR_Y + panelH - FR / 2, cz);
    scene.add(topBar);

    for (const fx of [px0 + FR / 2, px1 - FR / 2]) {
        const post = new THREE.Mesh(new THREE.BoxGeometry(FR, panelH, FD), offFrameMat);
        post.position.set(fx, OFF_FLOOR_Y + panelH / 2, cz);
        scene.add(post);
    }

    // Single full-height glass pane (no mid-rail)
    const glW  = pw - FR * 2;
    const glH  = panelH - FR;
    const GD   = OFF_WALL_T * 0.3;
    const pane = new THREE.Mesh(new THREE.BoxGeometry(glW, glH, GD), offGlassMat);
    pane.position.set(pxM, OFF_FLOOR_Y + FR / 2 + glH / 2, cz);
    scene.add(pane);

    // Invisible collision box — added to worldGroup for physics only, not rendered
    const col = new THREE.Mesh(new THREE.BoxGeometry(pw, panelH, OFF_WALL_T), new THREE.MeshStandardMaterial());
    col.visible = false;
    col.position.set(pxM, OFF_FLOOR_Y + panelH / 2, cz);
    worldGroup.add(col);
}

// frontWallWithDoor: solid wall (runs in X) with door + flanking glass panels.
// Wall goes full height (OFF_H_FULL) to roof.
// Glass panels fill the space left and right of the door up to OFF_H.
function frontWallWithDoor(cx, cz, w, doorCX, doorW, doorH) {
    const x0 = cx - w / 2;   // east edge
    const x1 = cx + w / 2;   // west edge
    const FR  = 0.07;

    // ── Solid wall above door and above glass panels (from OFF_H to OFF_H_FULL) ──
    // Full-width solid band from interior ceiling up to roof
    wallBox(cx, OFF_FLOOR_Y + OFF_H, cz, w, OFF_H_FULL - OFF_H, OFF_WALL_T);

    // ── Solid wall segments beside the glass panels (very thin strips at edges) ──
    // We only need solid wall where there's no glass and no door.
    // Layout: [x0 ... glassLeftEnd] [door] [glassRightStart ... x1]
    // Glass panels extend from x0 to door left edge, and door right edge to x1.
    // But we want a small solid border (FR wide) at each outer edge.
    const doorX0 = doorCX - doorW / 2;
    const doorX1 = doorCX + doorW / 2;

    // Thin border posts at far left and far right (structural look)
    wallBox(x0 + FR / 2, OFF_FLOOR_Y, cz, FR, OFF_H, OFF_WALL_T);
    wallBox(x1 - FR / 2, OFF_FLOOR_Y, cz, FR, OFF_H, OFF_WALL_T);

    // Solid wall segment between door edge and glass panel edge (door frame surround)
    // Left of door (east side): thin solid strip for door frame only
    const leftSolid = 0.12;
    wallBox(doorX0 - leftSolid / 2, OFF_FLOOR_Y, cz, leftSolid, OFF_H, OFF_WALL_T);
    wallBox(doorX1 + leftSolid / 2, OFF_FLOOR_Y, cz, leftSolid, OFF_H, OFF_WALL_T);

    // Transom above door (from doorH to OFF_H)
    const transH = OFF_H - doorH;
    if (transH > 0.02) wallBox(doorCX, OFF_FLOOR_Y + doorH, cz, doorW + leftSolid * 2, transH, OFF_WALL_T);

    // ── Glass panels ──
    // Left panel: from x0+FR to doorX0-leftSolid
    const leftGlW = doorX0 - leftSolid - (x0 + FR);
    if (leftGlW > 0.2) glassPanel(x0 + FR, doorX0 - leftSolid, cz, OFF_H);
    // Right panel: from doorX1+leftSolid to x1-FR
    const rightGlW = (x1 - FR) - (doorX1 + leftSolid);
    if (rightGlW > 0.2) glassPanel(doorX1 + leftSolid, x1 - FR, cz, OFF_H);

    // ── Door frame ──
    for (const fdx of [-doorW / 2, doorW / 2]) {
        const fp = new THREE.Mesh(new THREE.BoxGeometry(FR, doorH, FR), offFrameMat);
        fp.position.set(doorCX + fdx, OFF_FLOOR_Y + doorH / 2, cz);
        scene.add(fp);
    }
    const ft = new THREE.Mesh(new THREE.BoxGeometry(doorW + FR * 2, FR, FR), offFrameMat);
    ft.position.set(doorCX, OFF_FLOOR_Y + doorH, cz);
    scene.add(ft);
}

// sideWallWithDoor: side wall (runs in Z) with a door gap, full height to roof.
function sideWallWithDoor(cx, z0, z1, doorCZ, doorW, doorH) {
    const botD   = doorCZ - doorW / 2 - z0;
    const topD   = z1 - (doorCZ + doorW / 2);
    const transH = OFF_H_FULL - doorH;
    const FR = 0.07;

    if (botD   > 0.02) wallBox(cx, OFF_FLOOR_Y, z0 + botD / 2,   OFF_WALL_T, OFF_H_FULL, botD);
    if (topD   > 0.02) wallBox(cx, OFF_FLOOR_Y, z1 - topD / 2,   OFF_WALL_T, OFF_H_FULL, topD);
    if (transH > 0.02) wallBox(cx, OFF_FLOOR_Y + doorH, doorCZ,  OFF_WALL_T, transH, doorW);

    for (const fdz of [-doorW / 2, doorW / 2]) {
        const fp = new THREE.Mesh(new THREE.BoxGeometry(FR, doorH, FR), offFrameMat);
        fp.position.set(cx, OFF_FLOOR_Y + doorH / 2, doorCZ + fdz);
        scene.add(fp);
    }
    const ft = new THREE.Mesh(new THREE.BoxGeometry(FR, FR, doorW + FR * 2), offFrameMat);
    ft.position.set(cx, OFF_FLOOR_Y + doorH, doorCZ);
    scene.add(ft);
}

//  (from OFF_Z_BACK to MEZ_Z1).

{

const MIDDLE_OFFICES = [
    { label: "Paul's Office", xW:  9,  xE: -1,  door: 1.2 },
    { label: "Tiffany's",     xW: -1,  xE: -11, door: 1.2 },

    // West divider wall — full height

    frontWallWithDoor(xM, OFF_Z_FRONT - OFF_WALL_T / 2, w, xM, door, dH);

    makeOfficeLabel(cfg.label, xM, OFF_FLOOR_Y + OFF_H - 0.8, OFF_Z_FRONT + 0.3);

//  Protrudes into the pathway — north face at MEZ_Z1 (guardrail line).
//  Door on west side wall (x=-57), centered in Z across full room depth.
//  All outer walls full height to roof.

{

    const xM = (xW + xE) / 2;       // -63.5

    wallBox(xM, OFF_FLOOR_Y, mtgZ0 + OFF_WALL_T / 2, w, OFF_H_FULL, OFF_WALL_T);
    // North face (z=MEZ_Z1=-33) — 3 large glass panels with thin solid borders
    {
        const nz  = mtgZ1 - OFF_WALL_T / 2;
        const panH = OFF_H;               // panels go up to interior ceiling height
        const aboveH = OFF_H_FULL - OFF_H; // solid band above panels to roof
        const BORD = 0.15;                // narrow solid border at each edge & between panels
        const panW = (w - BORD * 4) / 3; // three equal panels

        // Solid band above all three panels (interior ceiling → roof)
        wallBox(xM, OFF_FLOOR_Y + OFF_H, nz, w, aboveH, OFF_WALL_T);
        // Thin border strips between / beside panels
        for (let i = 0; i <= 3; i++) {
            const bx = xE + i * (panW + BORD) + BORD / 2;
            wallBox(bx, OFF_FLOOR_Y, nz, BORD, panH, OFF_WALL_T);
        }
        // Three glass panels
        for (let i = 0; i < 3; i++) {
            const px0 = xE + BORD + i * (panW + BORD);
            const px1 = px0 + panW;
            glassPanel(px0, px1, nz, panH);
        }
    }
    // East cap wall (x=-70) — full height
    wallBox(xE + OFF_WALL_T / 2, OFF_FLOOR_Y, mtgZM, OFF_WALL_T, OFF_H_FULL, mtgD);
    // Interior ceiling slab
    ceilBox(xM, mtgZM, w, mtgD);
    // West side wall (x=-57) with door centered on pathway zone
    const mtgDoorCZ = (OFF_Z_FRONT + MEZ_Z1) / 2;
    sideWallWithDoor(xW - OFF_WALL_T / 2, mtgZ0, mtgZ1, mtgDoorCZ, 1.6, OFF_DOOR_H);

    makeOfficeLabel('Meeting Room', xM, OFF_FLOOR_Y + OFF_H - 0.8, mtgZM);
}

// ── Re-bake octree ──
worldOctree.fromGraphNode(worldGroup);

// ─────────────────────────────────────────────────────────────
//  PERIMETER WALLS — east and west faces of the building

//  north end of the building (z=+100), full height (CEIL_Y=22).
//  West wall: x=20 (Sensory/Lab west face)
//  East wall: x=-70 (Meeting Room east face)
// ─────────────────────────────────────────────────────────────
const WALL_MAT   = new THREE.MeshStandardMaterial({ color: 0xc8c0b4, roughness: 0.9 });
const BLDG_Z_N   = 100;    // north extent of building
const WALL_RUN   = BLDG_Z_N - MEZ_Z1;      // from z=-33 to z=100 = 133 units
const WALL_CEN_Z = (MEZ_Z1 + BLDG_Z_N) / 2;  // 33.5

// West wall (x = MEZ_X1 = 20)
const westWall = new THREE.Mesh(

    WALL_MAT
);
westWall.position.set(MEZ_X1, CEIL_Y / 2, WALL_CEN_Z);

// East wall (x = MEZ_X0 = -70)
const eastWall = new THREE.Mesh(

);
eastWall.position.set(MEZ_X0, CEIL_Y / 2, WALL_CEN_Z);

// North wall connecting east and west (z = BLDG_Z_N = 100)

);

// ─────────────────────────────────────────────────────────────
//  LIGHTING
// ─────────────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xdde8ff, 0x443322, 0.9));
const sun = new THREE.DirectionalLight(0xfff4e8, 0.8);
sun.position.set(10, 20, -10);

// Warm fill lights
[[-25, 8, -5], [0, 8, 30], [15, 8, 50]].forEach(([lx,ly,lz]) => {

// ─────────────────────────────────────────────────────────────
//  SPRAY / WATER PARTICLES
// ─────────────────────────────────────────────────────────────
const particles  = [];
const sprayRay   = new THREE.Raycaster();
let   isSpraying = false;
let   sprayTimer = 0;

// Shared geometry/material — one droplet size, one splat size
const dropGeo   = new THREE.SphereGeometry(0.045, 5, 4);
const splatGeo  = new THREE.SphereGeometry(0.055, 5, 4);
const dropMat   = new THREE.MeshBasicMaterial({ color:0x55ddff, transparent:true, opacity:0.80 });
const splatMat  = new THREE.MeshBasicMaterial({ color:0xaaeeff, transparent:true, opacity:0.55 });

// Dirt meshes for cleaning raycast
const dirtMeshes = dirtPatches.map(d => d.mesh);

// Nozzle offset — hose held at hip-right, not floating from eye center
const NOZZLE_RIGHT = 0.28;
const NOZZLE_DOWN  = 0.22;
const NOZZLE_FWD   = 0.4;

function spawnDroplet() {
    // Compute nozzle world position (right side, slightly below camera)
    const right = new THREE.Vector3();
    const fwd   = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    right.crossVectors(fwd, camera.up).normalize();

    const nozzle = camera.position.clone()
        .addScaledVector(right, NOZZLE_RIGHT)
        .addScaledVector(camera.up, -NOZZLE_DOWN)
        .addScaledVector(fwd, NOZZLE_FWD);

    // Aim: toward crosshair (camera forward) with a tiny random cone spread
    const spread = 0.032;
    const vel = fwd.clone().multiplyScalar(18).add(
        new THREE.Vector3(
            (Math.random() - 0.5) * spread,
            (Math.random() - 0.5) * spread,
            (Math.random() - 0.5) * spread
        )
    );

    const p = new THREE.Mesh(dropGeo, dropMat);
    p.position.copy(nozzle);
    p.userData.vel      = vel;
    p.userData.life     = 1.4;
    p.userData.maxLife  = 1.4;
    p.userData.isSplat  = false;
    p.userData.fading   = false;
    scene.add(p);
    particles.push(p);
}

function spawnSplat(pos, count) {
    for (let i = 0; i < count; i++) {
        if (particles.length > 220) break;
        const s = new THREE.Mesh(splatGeo, splatMat);
        s.position.copy(pos).add(new THREE.Vector3(
            (Math.random() - 0.5) * 0.15,
             Math.random() * 0.08,
            (Math.random() - 0.5) * 0.15
        ));
        s.userData.vel = new THREE.Vector3(
            (Math.random() - 0.5) * 2.5,
             Math.random() * 3.5 + 1.0,
            (Math.random() - 0.5) * 2.5
        );
        s.userData.life    = 0.35 + Math.random() * 0.3;
        s.userData.maxLife = s.userData.life;
        s.userData.isSplat = true;
        s.userData.fading  = false;
        scene.add(s);
        particles.push(s);
    }
}

// Clean any dirt patch whose center is within CLEAN_RADIUS of a droplet impact point
const CLEAN_RADIUS = 1.2;
function checkDirtHit(point) {
    for (const patch of dirtPatches) {
        if (patch.cleaned) continue;
        const d = patch.mesh.position.distanceTo(point);
        if (d < CLEAN_RADIUS) {
            patch.cleaned = true;
            cleanedCount++;
            patch.mesh.material = patch.mesh.material.clone();
            patch.mesh.material.transparent = true;
            patch.mesh.material.opacity = 0;
            updateHUD();
        }
    }
}

// Per-frame particle update — gravity, bounce detection, fade
const _gravDelta = new THREE.Vector3(0, -12, 0);  // gravity in world-units/s²
const _bounceRay = new THREE.Raycaster();
// Collect solid meshes for splat detection (floor + tank proxies)
const bounceSurfaces = [];
worldGroup.traverse(o => { if (o.isMesh) bounceSurfaces.push(o); });

function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p   = particles[i];
        const vel = p.userData.vel;

        // Bounce / splat on surfaces
        if (!p.userData.isSplat && bounceSurfaces.length) {
            const speed = vel.length();
            if (speed > 0.01) {
                _bounceRay.set(p.position, vel.clone().normalize());
                _bounceRay.far = speed * delta * 3.0;
                const hits = _bounceRay.intersectObjects(bounceSurfaces, false);
                if (hits.length) {
                    const hit = hits[0];
                    // Only splat on upward or side faces (not from below)
                    if (hit.face && hit.face.normal) {
                        const wn = hit.face.normal.clone()
                            .transformDirection(hit.object.matrixWorld);
                        if (wn.dot(vel.clone().normalize()) < -0.1) {
                            spawnSplat(hit.point, 5);
                            checkDirtHit(hit.point);
                            // Remove the droplet on impact
                            scene.remove(p);
                            particles.splice(i, 1);
                            continue;
                        }
                    }
                }
            }
        }

        // Gravity
        vel.addScaledVector(_gravDelta, delta);
        p.position.addScaledVector(vel, delta);
        p.userData.life -= delta;

        // Fade out last 0.3s of life
        const FADE = 0.30;
        if (p.userData.life < FADE) {
            if (!p.userData.fading) {
                // Clone material so we can change opacity independently
                p.material = p.material.clone();
                p.userData.fading = true;
            }
            const baseOpacity = p.userData.isSplat ? 0.55 : 0.80;
            p.material.opacity = Math.max(0, (p.userData.life / FADE) * baseOpacity);
        }

        if (p.userData.life <= 0 || p.position.y < -2) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }
}

// ─────────────────────────────────────────────────────────────
//  CONTROLS  (identical to OG)
// ─────────────────────────────────────────────────────────────
const ui        = document.getElementById('ui-layer');
const crosshair = document.getElementById('crosshair');
const hud       = document.getElementById('hud');
let   isLocked  = false;

ui.addEventListener('click', () => document.body.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
    isLocked = document.pointerLockElement === document.body;
    ui.style.display        = isLocked ? 'none'  : 'flex';
    crosshair.style.display = isLocked ? 'block' : 'none';
    hud.style.display       = isLocked ? 'block' : 'none';
    if (isLocked) updateHUD();
});

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup',   e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
    if (!isLocked) return;
    camera.rotation.y -= e.movementX * 0.002;
    camera.rotation.x -= e.movementY * 0.002;
    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
});

window.addEventListener('mousedown', e => { if (e.button === 0) isSpraying = true; });
window.addEventListener('mouseup',   e => { if (e.button === 0) isSpraying = false; });

// ─────────────────────────────────────────────────────────────
//  GAME LOOP  (identical to OG)
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(0.05, clock.getDelta());

    if (isLocked) {
        // Damping
        let damping = Math.exp(-4 * delta) - 1;
        if (!playerOnFloor) {
            playerVelocity.y -= 30 * delta;
            damping = Math.exp(-1.5 * delta) - 1;
        }
        playerVelocity.addScaledVector(playerVelocity, damping);

        // Movement
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        forward.y = 0; forward.normalize();
        const side = new THREE.Vector3().crossVectors(forward, camera.up);

        const speed = 20 * delta;
        if (keys['KeyW']) playerVelocity.addScaledVector(forward,  speed);
        if (keys['KeyS']) playerVelocity.addScaledVector(forward, -speed);
        if (keys['KeyA']) playerVelocity.addScaledVector(side,    -speed);
        if (keys['KeyD']) playerVelocity.addScaledVector(side,     speed);
        if (playerOnFloor && keys['Space']) playerVelocity.y = 12;

        playerCapsule.translate(playerVelocity.clone().multiplyScalar(delta));

        // Octree collision (real Three.js addon — stairs just work)
        const result = worldOctree.capsuleIntersect(playerCapsule);
        playerOnFloor = false;
        if (result) {
            playerOnFloor = result.normal.y > 0;
            playerCapsule.translate(result.normal.multiplyScalar(result.depth));
        }

        // Fall reset
        if (playerCapsule.start.y < -5) {
            playerCapsule.start.set(0, 0.35, 15);
            playerCapsule.end.set(0, 1.65, 15);
            playerVelocity.set(0, 0, 0);
        }

        camera.position.copy(playerCapsule.end);

        // Spray
        if (isSpraying) {
            sprayTimer += delta;
            // ~25 droplets/sec — tight enough for a stream, not a wall of blue
            if (sprayTimer >= 0.04) {
                sprayTimer = 0;
                spawnDroplet();
            }
        } else {
            sprayTimer = 0;
        }
    }

    updateParticles(delta);

    renderer.render(scene, camera);
}

animate();
</script>
